<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 700" stroke="currentColor" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
  <style>:root { color: #1B2438; }</style>
  <!-- Heart shape: two lines meeting at a point below, with a V notch at top -->
  <!-- Top-left corner heart -->
  <polyline points="26,30 31,22 36,30 31,38"/>
  <polyline points="31,22 36,30"/>
  <!-- Top-right corner heart -->
  <polyline points="464,31 469,23 474,31 469,39"/>
  <!-- Bottom-left corner heart -->
  <polyline points="27,666 32,658 37,666 32,674"/>
  <!-- Bottom-right corner heart -->
  <polyline points="463,665 468,657 473,665 468,673"/>
  <!-- Top midpoint heart -->
  <polyline points="245,31 250,23 255,31 250,39"/>
  <!-- Bottom midpoint heart -->
  <polyline points="246,667 251,659 256,667 251,675"/>
  <!-- Left midpoint heart -->
  <polyline points="26,346 31,338 36,346 31,354"/>
  <!-- Right midpoint heart -->
  <polyline points="464,347 469,339 474,347 469,355"/>
  <!-- Connecting lines -->
  <line x1="38" y1="30" x2="244" y2="31"/>
  <line x1="256" y1="31" x2="463" y2="31"/>
  <line x1="39" y1="666" x2="245" y2="667"/>
  <line x1="257" y1="667" x2="462" y2="665"/>
  <line x1="31" y1="40" x2="31" y2="337"/>
  <line x1="31" y1="355" x2="32" y2="657"/>
  <line x1="469" y1="41" x2="469" y2="338"/>
  <line x1="469" y1="356" x2="468" y2="656"/>
</svg>
