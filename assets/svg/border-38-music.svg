<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 700" stroke="currentColor" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
  <style>:root { color: #1B2438; }</style>
  <!-- Main border -->
  <rect x="40" y="40" width="420" height="620" rx="0" ry="0"/>
  <!-- Top-left music note: oval head + stem -->
  <ellipse cx="22" cy="55" rx="6" ry="4.5" transform="rotate(-20 22 55)"/>
  <line x1="28" y1="52" x2="28" y2="30"/>
  <!-- Top-right music note -->
  <ellipse cx="478" cy="55" rx="6" ry="4.5" transform="rotate(20 478 55)"/>
  <line x1="472" y1="52" x2="472" y2="30"/>
  <!-- Left edge note -->
  <ellipse cx="22" cy="300" rx="6" ry="4.5" transform="rotate(-20 22 300)"/>
  <line x1="28" y1="297" x2="28" y2="275"/>
  <!-- Right edge note -->
  <ellipse cx="478" cy="400" rx="6" ry="4.5" transform="rotate(20 478 400)"/>
  <line x1="472" y1="397" x2="472" y2="375"/>
  <!-- Bottom-left music note -->
  <ellipse cx="22" cy="650" rx="6" ry="4.5" transform="rotate(-20 22 650)"/>
  <line x1="28" y1="647" x2="28" y2="625"/>
  <!-- Bottom-right music note -->
  <ellipse cx="478" cy="650" rx="6" ry="4.5" transform="rotate(20 478 650)"/>
  <line x1="472" y1="647" x2="472" y2="625"/>
  <!-- Top edge double note (beamed pair) -->
  <ellipse cx="200" cy="28" rx="5" ry="3.5" transform="rotate(-20 200 28)"/>
  <line x1="205" y1="25" x2="205" y2="10"/>
  <ellipse cx="218" cy="28" rx="5" ry="3.5" transform="rotate(-20 218 28)"/>
  <line x1="223" y1="25" x2="223" y2="10"/>
  <line x1="205" y1="10" x2="223" y2="10"/>
  <!-- Bottom edge double note (beamed pair) -->
  <ellipse cx="300" cy="672" rx="5" ry="3.5" transform="rotate(-20 300 672)"/>
  <line x1="305" y1="669" x2="305" y2="685"/>
  <ellipse cx="318" cy="672" rx="5" ry="3.5" transform="rotate(-20 318 672)"/>
  <line x1="323" y1="669" x2="323" y2="685"/>
  <line x1="305" y1="685" x2="323" y2="685"/>
</svg>
