<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 700" stroke="currentColor" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
  <style>:root { color: #1B2438; }</style>
  <!-- Curtain rod across top -->
  <line x1="25" y1="28" x2="475" y2="28"/>
  <!-- Rod finials -->
  <circle cx="25" cy="28" r="5"/>
  <circle cx="475" cy="28" r="5"/>
  <!-- Left curtain drape lines -->
  <line x1="30" y1="33" x2="25" y2="200"/>
  <line x1="50" y1="33" x2="30" y2="180"/>
  <line x1="70" y1="33" x2="35" y2="160"/>
  <line x1="90" y1="33" x2="40" y2="140"/>
  <!-- Left tieback -->
  <ellipse cx="32" cy="170" rx="12" ry="5" transform="rotate(-80 32 170)"/>
  <!-- Right curtain drape lines -->
  <line x1="470" y1="33" x2="475" y2="200"/>
  <line x1="450" y1="33" x2="470" y2="180"/>
  <line x1="430" y1="33" x2="465" y2="160"/>
  <line x1="410" y1="33" x2="460" y2="140"/>
  <!-- Right tieback -->
  <ellipse cx="468" cy="170" rx="12" ry="5" transform="rotate(80 468 170)"/>
  <!-- Bottom border line -->
  <line x1="25" y1="672" x2="475" y2="672"/>
  <!-- Side border lines below curtains -->
  <line x1="25" y1="200" x2="25" y2="672"/>
  <line x1="475" y1="200" x2="475" y2="672"/>
</svg>
