<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 180" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <style>:root { color: #1B2438; }</style>

  <!-- Base -- wide flared tripod legs -->
  <path d="M 30 175 C 22 172 14 168 10 160" />
  <path d="M 30 175 C 38 172 46 168 50 160" />
  <path d="M 10 160 C 14 155 20 150 24 140" />
  <path d="M 50 160 C 46 155 40 150 36 140" />

  <!-- Main shaft lower (tapers from base to pod) -->
  <line x1="24" y1="140" x2="26" y2="100" />
  <line x1="36" y1="140" x2="34" y2="100" />

  <!-- Observation deck (main pod) -->
  <path d="M 12 105 Q 12 95 30 90 Q 48 95 48 105" />
  <path d="M 12 105 Q 12 114 30 118 Q 48 114 48 105" />
  <!-- Pod window band -->
  <path d="M 14 100 Q 30 96 46 100" />
  <path d="M 13 108 Q 30 104 47 108" />
  <!-- Pod floor line -->
  <line x1="14" y1="112" x2="46" y2="112" />

  <!-- Upper shaft (pod to SkyPod) -->
  <line x1="27" y1="90" x2="28" y2="65" />
  <line x1="33" y1="90" x2="32" y2="65" />

  <!-- SkyPod (smaller upper observation) -->
  <path d="M 22 68 Q 22 63 30 61 Q 38 63 38 68" />
  <path d="M 22 68 Q 22 72 30 74 Q 38 72 38 68" />

  <!-- Antenna shaft -->
  <line x1="29" y1="61" x2="29.5" y2="20" />
  <line x1="31" y1="61" x2="30.5" y2="20" />

  <!-- Antenna tip -->
  <line x1="30" y1="20" x2="30" y2="5" />

  <!-- Antenna crossbars -->
  <line x1="27" y1="35" x2="33" y2="35" />
  <line x1="28" y1="25" x2="32" y2="25" />
  <line x1="28.5" y1="15" x2="31.5" y2="15" />

  <!-- Clouds and birds -->
  <path d="M 2 50 Q 8 44 14 50" />
  <path d="M 46 70 Q 52 64 56 70" />
  <!-- Bird -->
  <path d="M 4 30 Q 7 27 10 30" />
  <path d="M 48 40 Q 51 37 54 40" />
