<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 140 130" stroke="currentColor" fill="none" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
  <style>:root { color: #1B2438; }</style>
  <!-- Kash head (from behind) -->
  <circle cx="50" cy="24" r="8"/>
  <!-- Kash body -->
  <line x1="50" y1="32" x2="50" y2="60"/>
  <polygon points="42,60 58,60 56,95 44,95"/>
  <line x1="50" y1="42" x2="38" y2="56"/>
  <line x1="50" y1="42" x2="62" y2="52"/>
  <!-- Max head (from behind) -->
  <circle cx="90" cy="18" r="8"/>
  <!-- Max body -->
  <line x1="90" y1="26" x2="90" y2="58"/>
  <line x1="90" y1="58" x2="84" y2="100"/>
  <line x1="90" y1="58" x2="96" y2="100"/>
  <line x1="90" y1="40" x2="102" y2="54"/>
  <line x1="90" y1="40" x2="78" y2="52"/>
  <!-- Hands linked -->
  <line x1="62" y1="52" x2="78" y2="52"/>
  <!-- Walking motion - slight leg offset -->
  <line x1="50" y1="95" x2="46" y2="100"/>
  <line x1="96" y1="100" x2="100" y2="105"/>
</svg>
