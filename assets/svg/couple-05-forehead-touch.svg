<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 90 110" stroke="currentColor" fill="none" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
  <style>:root { color: #1B2438; }</style>
