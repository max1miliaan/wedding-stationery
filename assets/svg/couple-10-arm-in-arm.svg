<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 130 130" stroke="currentColor" fill="none" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
  <style>:root { color: #1B2438; }</style>
  <!-- Kash head -->
  <circle cx="48" cy="26" r="8"/>
