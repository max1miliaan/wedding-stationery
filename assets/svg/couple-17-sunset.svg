<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 140 110" stroke="currentColor" fill="none" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
  <style>:root { color: #1B2438; }</style>
  <!-- Sun (half circle on horizon) -->
  <circle cx="110" cy="65" r="14"/>
  <!-- Horizon line -->
  <line x1="5" y1="65" x2="135" y2="65"/>
  <!-- Kash head -->
  <circle cx="40" cy="28" r="8"/>
  <circle cx="42" cy="27" r="1.5" fill="currentColor" stroke="none"/>
  <!-- Kash body -->
  <line x1="40" y1="36" x2="40" y2="60"/>
  <polygon points="32,60 48,60 46,90 34,90"/>
  <line x1="40" y1="46" x2="30" y2="56"/>
  <!-- Max head -->
  <circle cx="62" cy="22" r="8"/>
  <circle cx="60" cy="21" r="1.5" fill="currentColor" stroke="none"/>
  <!-- Max body -->
  <line x1="62" y1="30" x2="62" y2="58"/>
  <line x1="62" y1="58" x2="56" y2="95"/>
  <line x1="62" y1="58" x2="68" y2="95"/>
  <line x1="62" y1="42" x2="72" y2="54"/>
  <!-- Max arm around Kash -->
  <line x1="62" y1="42" x2="48" y2="44"/>
</svg>
