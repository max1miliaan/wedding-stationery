<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 100" stroke="currentColor" fill="none" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
  <style>:root { color: #1B2438; }</style>
  <!-- Car body -->
  <rect x="20" y="40" width="120" height="30" rx="4"/>
  <!-- Car roof / windshield -->
  <polygon points="50,40 60,18 110,18 120,40"/>
  <!-- Car wheels -->
  <circle cx="48" cy="74" r="8"/>
  <circle cx="120" cy="74" r="8"/>
  <!-- Kash head (passenger) -->
  <circle cx="72" cy="28" r="6"/>
  <circle cx="73" cy="27" r="1.5" fill="currentColor" stroke="none"/>
  <!-- Max head (driver) -->
  <circle cx="98" cy="26" r="6"/>
  <circle cx="97" cy="25" r="1.5" fill="currentColor" stroke="none"/>
  <!-- Window divider -->
  <line x1="85" y1="18" x2="85" y2="40"/>
  <!-- Just married banner -->
  <line x1="0" y1="52" x2="20" y2="52"/>
  <!-- Exhaust / trailing lines -->
  <line x1="2" y1="48" x2="16" y2="48"/>
  <line x1="5" y1="56" x2="15" y2="56"/>
</svg>
