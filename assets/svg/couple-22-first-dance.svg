  <!-- Max head -->
  <circle cx="68" cy="22" r="8"/>
  <circle cx="66" cy="21" r="1.5" fill="currentColor" stroke="none"/>
  <!-- Max body (suit) -->
  <line x1="68" y1="30" x2="68" y2="62"/>
  <line x1="68" y1="62" x2="62" y2="110"/>
  <line x1="68" y1="62" x2="76" y2="110"/>
