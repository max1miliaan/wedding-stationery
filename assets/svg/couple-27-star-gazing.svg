  <line x1="42" y1="105" x2="42" y2="130"/>
  <!-- Kash arm up pointing -->
  <line x1="42" y1="112" x2="36" y2="100"/>
  <!-- Max head (lying down) -->
  <circle cx="62" cy="98" r="8"/>
  <circle cx="64" cy="97" r="1.5" fill="currentColor" stroke="none"/>
  <!-- Max body (horizontal) -->
  <line x1="62" y1="105" x2="62" y2="135"/>
  <!-- Max arm up -->
  <line x1="62" y1="114" x2="56" y2="100"/>
  <!-- Stars -->
  <circle cx="30" cy="20" r="1.5" fill="currentColor" stroke="none"/>
  <circle cx="55" cy="15" r="1.5" fill="currentColor" stroke="none"/>
  <circle cx="80" cy="25" r="1.5" fill="currentColor" stroke="none"/>
  <circle cx="45" cy="40" r="1.5" fill="currentColor" stroke="none"/>
  <circle cx="95" cy="18" r="1.5" fill="currentColor" stroke="none"/>
  <circle cx="70" cy="45" r="1.5" fill="currentColor" stroke="none"/>
</svg>
