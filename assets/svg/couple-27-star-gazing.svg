<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 150" stroke="currentColor" fill="none" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
  <style>:root { color: #1B2438; }</style>
  <!-- Ground line -->
  <line x1="10" y1="105" x2="110" y2="105"/>
  <!-- Kash head (lying down) -->
  <circle cx="42" cy="98" r="7"/>
  <circle cx="44" cy="97" r="1.5" fill="currentColor" stroke="none"/>
