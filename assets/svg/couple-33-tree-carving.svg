  <!-- Kash body -->
  <line x1="35" y1="69" x2="35" y2="98"/>
  <polygon points="27,98 35,98 43,126"/>
  <!-- Kash arm (touching tree) -->
  <line x1="35" y1="78" x2="50" y2="72"/>
  <!-- Max head -->
  <circle cx="82" cy="54" r="8"/>
  <circle cx="80" cy="53" r="1.5" fill="currentColor" stroke="none"/>
  <!-- Max body -->
  <line x1="82" y1="62" x2="82" y2="94"/>
  <line x1="82" y1="94" x2="76" y2="126"/>
  <line x1="82" y1="94" x2="88" y2="126"/>
  <!-- Max arm (carving) -->
  <line x1="82" y1="72" x2="64" y2="70"/>
</svg>
