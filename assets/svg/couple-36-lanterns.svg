<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 150" stroke="currentColor" fill="none" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
  <style>:root { color: #1B2438; }</style>
  <!-- Kash head -->
  <circle cx="42" cy="58" r="7"/>
  <circle cx="40" cy="57" r="1.5" fill="currentColor" stroke="none"/>
  <!-- Kash body -->
  <line x1="42" y1="65" x2="42" y2="95"/>
  <polygon points="34,95 42,95 50,125"/>
  <!-- Kash arm (releasing lantern) -->
  <line x1="42" y1="74" x2="34" y2="60"/>
  <!-- Max head -->
  <circle cx="72" cy="50" r="8"/>
  <circle cx="70" cy="49" r="1.5" fill="currentColor" stroke="none"/>
  <!-- Max body -->
  <line x1="72" y1="58" x2="72" y2="90"/>
  <line x1="72" y1="90" x2="66" y2="125"/>
  <line x1="72" y1="90" x2="78" y2="125"/>
  <!-- Max arm (releasing lantern) -->
  <line x1="72" y1="68" x2="82" y2="52"/>
  <!-- Lantern 1 (Kash side, floating up) -->
  <rect x="24" y="38" width="12" height="16" rx="2"/>
  <line x1="30" y1="38" x2="34" y2="60"/>
  <!-- Lantern 2 (Max side, floating up) -->
  <rect x="78" y="30" width="12" height="16" rx="2"/>
  <line x1="84" y1="46" x2="82" y2="52"/>
  <!-- Lantern 3 (already released, high) -->
  <rect x="50" y="8" width="10" height="14" rx="2"/>
</svg>
