<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 150" stroke="currentColor" fill="none" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
  <style>:root { color: #1B2438; }</style>
  <!-- Window frame -->
  <rect x="15" y="10" width="90" height="100" rx="3"/>
  <!-- Window crossbar vertical -->
  <line x1="60" y1="10" x2="60" y2="110"/>
  <!-- Window crossbar horizontal -->
  <line x1="15" y1="55" x2="105" y2="55"/>
  <!-- Window seat / sill -->
  <rect x="15" y="110" width="90" height="8"/>
  <!-- Kash head (seated on sill) -->
  <circle cx="42" cy="88" r="7"/>
  <circle cx="40" cy="87" r="1.5" fill="currentColor" stroke="none"/>
  <!-- Kash body (seated, leaning) -->
  <line x1="42" y1="95" x2="42" y2="112"/>
  <!-- Kash legs (drawn up) -->
  <line x1="42" y1="112" x2="50" y2="118"/>
  <!-- Kash arm -->
  <line x1="42" y1="102" x2="56" y2="98"/>
  <!-- Max head (seated on sill) -->
  <circle cx="72" cy="82" r="8"/>
  <circle cx="70" cy="81" r="1.5" fill="currentColor" stroke="none"/>
  <!-- Max body -->
  <line x1="72" y1="90" x2="72" y2="112"/>
  <!-- Max legs -->
  <line x1="72" y1="112" x2="66" y2="118"/>
  <!-- Max arm (around Kash) -->
  <line x1="72" y1="98" x2="50" y2="102"/>
</svg>
