<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 150" stroke="currentColor" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <style>:root { color: #1B2438; }</style>
  <!-- Left arm (Kash) flowing from bottom-left -->
  <path d="M 8 120 C 14 108, 22 92, 30 78 C 36 68, 40 60, 44 52" />
  <!-- Left hand fingers forming heart curve -->
  <path d="M 44 52 C 46 46, 50 40, 54 36 C 56 34, 58 34, 58 36" />
  <!-- Heart left lobe -->
  <path d="M 58 36 C 56 30, 52 26, 48 28 C 44 30, 42 36, 46 42" />
  <!-- Heart bottom point -->
  <path d="M 46 42 C 50 50, 56 58, 60 64" />

  <!-- Right arm (Max) flowing from bottom-right -->
  <path d="M 112 120 C 106 108, 98 92, 90 78 C 84 68, 80 60, 76 52" />
  <!-- Right hand fingers forming heart curve -->
  <path d="M 76 52 C 74 46, 70 40, 66 36 C 64 34, 62 34, 62 36" />
  <!-- Heart right lobe -->
  <path d="M 62 36 C 64 30, 68 26, 72 28 C 76 30, 78 36, 74 42" />
  <!-- Heart bottom point (meeting) -->
  <path d="M 74 42 C 70 50, 64 58, 60 64" />

  <!-- K & M monogram inside heart -->
  <path d="M 54 42 L 54 54" stroke-width="1.5" />
  <path d="M 54 47 L 60 42" stroke-width="1.5" />
  <path d="M 54 47 L 60 54" stroke-width="1.5" />
  <path d="M 63 54 L 63 42 L 66 50 L 69 42 L 69 54" stroke-width="1.5" />
</svg>
