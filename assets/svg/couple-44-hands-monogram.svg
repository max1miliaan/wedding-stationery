<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 150" stroke="currentColor" fill="none" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
  <style>:root { color: #1B2438; }</style>
  <!-- Left hand (Kash) - arm coming from left -->
  <line x1="10" y1="90" x2="35" y2="70"/>
  <!-- Left hand fingers forming heart -->
  <line x1="35" y1="70" x2="45" y2="55"/>
  <line x1="45" y1="55" x2="52" y2="45"/>
  <line x1="52" y1="45" x2="58" y2="40"/>
  <!-- Heart top left curve (as lines) -->
  <line x1="58" y1="40" x2="55" y2="34"/>
  <line x1="55" y1="34" x2="50" y2="32"/>
  <line x1="50" y1="32" x2="46" y2="34"/>
  <line x1="46" y1="34" x2="44" y2="40"/>
  <!-- Heart bottom point -->
  <line x1="44" y1="40" x2="60" y2="65"/>
  <!-- Right hand (Max) - arm coming from right -->
  <line x1="110" y1="90" x2="85" y2="70"/>
  <!-- Right hand fingers forming heart -->
  <line x1="85" y1="70" x2="75" y2="55"/>
  <line x1="75" y1="55" x2="68" y2="45"/>
  <line x1="68" y1="45" x2="62" y2="40"/>
  <!-- Heart top right curve -->
  <line x1="62" y1="40" x2="65" y2="34"/>
  <line x1="65" y1="34" x2="70" y2="32"/>
  <line x1="70" y1="32" x2="74" y2="34"/>
  <line x1="74" y1="34" x2="76" y2="40"/>
  <!-- Heart bottom meet -->
  <line x1="76" y1="40" x2="60" y2="65"/>
</svg>
