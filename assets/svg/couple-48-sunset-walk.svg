<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 150" stroke="currentColor" fill="none" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
  <style>:root { color: #1B2438; }</style>
  <!-- Horizon line -->
  <line x1="0" y1="105" x2="120" y2="105"/>
  <!-- Sun (half circle at horizon) -->
  <circle cx="60" cy="105" r="22"/>
  <!-- Sun rays -->
  <line x1="60" y1="78" x2="60" y2="70"/>
  <line x1="40" y1="85" x2="35" y2="78"/>
  <line x1="80" y1="85" x2="85" y2="78"/>
  <!-- Kash head (walking toward sun) -->
  <circle cx="38" cy="68" r="7"/>
  <circle cx="40" cy="67" r="1.5" fill="currentColor" stroke="none"/>
  <!-- Kash body -->
  <line x1="38" y1="75" x2="40" y2="98"/>
  <!-- Kash legs (walking) -->
  <line x1="40" y1="98" x2="36" y2="115"/>
  <line x1="40" y1="98" x2="46" y2="115"/>
  <!-- Kash arm (holding hands) -->
  <line x1="38" y1="82" x2="52" y2="76"/>
  <!-- Max head -->
  <circle cx="56" cy="60" r="8"/>
  <circle cx="58" cy="59" r="1.5" fill="currentColor" stroke="none"/>
  <!-- Max body -->
  <line x1="56" y1="68" x2="58" y2="96"/>
  <!-- Max legs (walking) -->
  <line x1="58" y1="96" x2="54" y2="115"/>
  <line x1="58" y1="96" x2="64" y2="115"/>
  <!-- Max arm (holding hands) -->
  <line x1="56" y1="76" x2="46" y2="82"/>
</svg>
