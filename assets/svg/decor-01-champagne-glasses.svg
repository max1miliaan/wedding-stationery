  <line x1="85" y1="55" x2="85" y2="100" />
  <!-- Right glass base -->
  <ellipse cx="85" cy="102" rx="15" ry="5" />
  <!-- Clink marks -->
  <line x1="55" y1="12" x2="60" y2="8" />
  <line x1="60" y1="16" x2="66" y2="12" />
  <line x1="57" y1="22" x2="63" y2="20" />
</svg>
