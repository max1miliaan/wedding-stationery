<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 100" stroke="currentColor" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <style>:root { color: #1B2438; }</style>
  <!-- Bottom tier -->
  <rect x="5" y="65" width="70" height="25" rx="2" />
  <!-- Middle tier -->
  <rect x="15" y="40" width="50" height="25" rx="2" />
  <!-- Top tier -->
  <rect x="25" y="20" width="30" height="20" rx="2" />
  <!-- Bottom tier decoration -->
  <line x1="10" y1="78" x2="70" y2="78" />
  <!-- Middle tier decoration -->
  <line x1="20" y1="53" x2="60" y2="53" />
  <!-- Top tier decoration -->
  <line x1="30" y1="30" x2="50" y2="30" />
  <!-- Topper -->
  <polyline points="36,20 40,8 44,20" />
</svg>
