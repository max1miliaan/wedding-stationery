<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 70" stroke="currentColor" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <style>:root { color: #1B2438; }</style>
  <!-- Cupcake base/wrapper -->
  <rect x="12" y="35" width="36" height="25" rx="3" />
  <!-- Wrapper lines -->
