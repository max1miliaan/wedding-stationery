<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 80" stroke="currentColor" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <style>:root { color: #1B2438; }</style>
  <!-- Confetti rectangles at various angles -->
  <rect x="10" y="15" width="8" height="4" rx="1" transform="rotate(25 14 17)" />
  <rect x="35" y="8" width="6" height="3" rx="1" transform="rotate(-15 38 9)" />
  <rect x="70" y="12" width="8" height="4" rx="1" transform="rotate(40 74 14)" />
  <rect x="95" y="20" width="7" height="3" rx="1" transform="rotate(-30 98 21)" />
  <rect x="20" y="50" width="6" height="3" rx="1" transform="rotate(55 23 51)" />
  <rect x="85" y="55" width="8" height="4" rx="1" transform="rotate(-20 89 57)" />
  <!-- Confetti circles -->
  <circle cx="55" cy="18" r="3" />
  <circle cx="105" cy="40" r="2.5" />
  <circle cx="15" cy="38" r="2" />
  <circle cx="60" cy="60" r="3" />
  <!-- Confetti lines -->
