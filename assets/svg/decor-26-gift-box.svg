<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 140" stroke="currentColor" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <style>:root { color: #1B2438; }</style>
  <!-- Box lid -->
  <rect x="15" y="50" width="90" height="15" />
  <!-- Box body -->
  <rect x="20" y="65" width="80" height="55" />
  <!-- Vertical ribbon on box -->
  <line x1="60" y1="65" x2="60" y2="120" />
  <!-- Horizontal ribbon on lid -->
  <line x1="15" y1="57" x2="105" y2="57" />
  <!-- Vertical ribbon on lid -->
  <line x1="60" y1="50" x2="60" y2="65" />
  <!-- Bow left loop -->
  <ellipse cx="48" cy="40" rx="12" ry="10" />
  <!-- Bow right loop -->
  <ellipse cx="72" cy="40" rx="12" ry="10" />
  <!-- Bow center knot -->
  <circle cx="60" cy="42" r="4" />
  <!-- Bow left tail -->
  <polyline points="48,48 35,30 40,28" />
  <!-- Bow right tail -->
  <polyline points="72,48 85,30 80,28" />
</svg>
