<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 140" stroke="currentColor" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <style>:root { color: #1B2438; }</style>
  <!-- Envelope body -->
  <rect x="10" y="35" width="100" height="70" />
  <!-- Envelope flap -->
  <polygon points="10,35 60,75 110,35" />
  <!-- Bottom fold lines -->
  <line x1="10" y1="105" x2="45" y2="72" />
  <line x1="110" y1="105" x2="75" y2="72" />
  <!-- Heart seal on flap -->
  <polygon points="60,50 55,45 52,48 60,58 68,48 65,45" />
  <!-- Small decorative line left -->
  <line x1="25" y1="30" x2="35" y2="30" />
  <!-- Small decorative line right -->
  <line x1="85" y1="30" x2="95" y2="30" />
</svg>
