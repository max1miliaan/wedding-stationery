<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 140" stroke="currentColor" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <style>:root { color: #1B2438; }</style>
  <!-- Flag pole -->
  <line x1="30" y1="10" x2="30" y2="130" />
  <!-- Pole top finial -->
  <circle cx="30" cy="8" r="4" />
  <!-- Flag body -->
  <polygon points="30,20 100,45 30,70" />
  <!-- Flag inner stripe top -->
  <line x1="35" y1="28" x2="80" y2="43" />
  <!-- Flag inner stripe bottom -->
  <line x1="35" y1="62" x2="80" y2="47" />
  <!-- Heart on flag center -->
  <polygon points="58,40 53,36 50,39 58,48 66,39 63,36" />
  <!-- Pole base -->
  <rect x="22" y="125" width="16" height="8" />
  <!-- Small pennant flutter lines -->
  <line x1="100" y1="42" x2="108" y2="40" />
  <line x1="100" y1="45" x2="108" y2="45" />
  <line x1="100" y1="48" x2="108" y2="50" />
</svg>
