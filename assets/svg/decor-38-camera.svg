<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 140" stroke="currentColor" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <style>:root { color: #1B2438; }</style>
  <!-- Camera body -->
  <rect x="15" y="45" width="90" height="60" rx="5" ry="5" />
  <!-- Viewfinder bump -->
  <polygon points="42,45 50,30 70,30 78,45" />
  <!-- Lens outer ring -->
  <circle cx="60" cy="75" r="20" />
  <!-- Lens inner ring -->
  <circle cx="60" cy="75" r="12" />
  <!-- Lens center -->
  <circle cx="60" cy="75" r="5" />
  <!-- Flash unit -->
  <rect x="82" y="50" width="15" height="8" />
  <!-- Shutter button -->
  <circle cx="85" cy="38" r="4" />
  <!-- Strap ring left -->
  <circle cx="15" cy="55" r="3" />
  <!-- Strap ring right -->
  <circle cx="105" cy="55" r="3" />
  <!-- Flash sparkle -->
  <line x1="100" y1="42" x2="105" y2="38" />
  <line x1="105" y1="45" x2="112" y2="45" />
</svg>
