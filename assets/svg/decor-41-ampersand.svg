<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 140" stroke="currentColor" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <style>:root { color: #1B2438; }</style>
  <!-- Ampersand upper loop -->
  <circle cx="55" cy="38" r="18" />
  <!-- Ampersand lower loop -->
  <ellipse cx="52" cy="85" rx="22" ry="20" />
  <!-- Ampersand diagonal cross stroke -->
  <line x1="35" y1="55" x2="80" y2="100" />
  <!-- Ampersand top entry stroke -->
  <line x1="70" y1="25" x2="60" y2="20" />
  <!-- Ampersand bottom tail -->
  <polyline points="74,95 85,105 90,100" />
  <!-- Decorative serif top -->
  <line x1="66" y1="23" x2="75" y2="23" />
  <!-- Decorative serif bottom -->
  <line x1="85" y1="103" x2="95" y2="103" />
  <!-- Small flourish left -->
  <polyline points="30,70 22,68 25,75" />
  <!-- Small flourish right -->
  <polyline points="80,70 88,68 85,75" />
</svg>
