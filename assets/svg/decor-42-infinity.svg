<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 140" stroke="currentColor" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <style>:root { color: #1B2438; }</style>
  <!-- Left loop of infinity (outer) -->
  <ellipse cx="38" cy="70" rx="28" ry="22" />
  <!-- Right loop of infinity (outer) -->
  <ellipse cx="82" cy="70" rx="28" ry="22" />
  <!-- Left loop of infinity (inner) -->
  <ellipse cx="38" cy="70" rx="18" ry="12" />
  <!-- Right loop of infinity (inner) -->
  <ellipse cx="82" cy="70" rx="18" ry="12" />
  <!-- Center crossing accent top -->
  <line x1="56" y1="58" x2="64" y2="58" />
  <!-- Center crossing accent bottom -->
  <line x1="56" y1="82" x2="64" y2="82" />
  <!-- Sparkle top left -->
  <line x1="30" y1="42" x2="30" y2="36" />
  <line x1="27" y1="39" x2="33" y2="39" />
  <!-- Sparkle top right -->
  <line x1="90" y1="42" x2="90" y2="36" />
  <line x1="87" y1="39" x2="93" y2="39" />
  <!-- Small dot accents -->
  <circle cx="60" cy="55" r="1.5" />
  <circle cx="60" cy="85" r="1.5" />
</svg>
