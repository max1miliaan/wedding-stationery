<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 140" stroke="currentColor" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <style>:root { color: #1B2438; }</style>
  <!-- Key bow (handle) outer circle -->
  <circle cx="40" cy="40" r="22" />
  <!-- Key bow inner circle -->
  <circle cx="40" cy="40" r="14" />
  <!-- Key bow decorative inner circle -->
  <circle cx="40" cy="40" r="6" />
  <!-- Key shaft -->
  <line x1="62" y1="40" x2="105" y2="40" />
  <!-- Key bit tooth 1 -->
  <polyline points="90,40 90,55 95,55 95,40" />
  <!-- Key bit tooth 2 -->
  <polyline points="98,40 98,50 103,50 103,40" />
  <!-- Key tip -->
  <line x1="105" y1="35" x2="105" y2="45" />
  <!-- Key collar -->
  <rect x="62" y="34" width="6" height="12" />
  <!-- Bow top ornament -->
  <circle cx="40" cy="18" r="2" />
  <!-- Small sparkle left -->
  <line x1="12" y1="30" x2="8" y2="26" />
  <line x1="10" y1="32" x2="10" y2="24" />
  <!-- Small sparkle right -->
  <line x1="65" y1="22" x2="70" y2="18" />
</svg>
