<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 140" stroke="currentColor" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <style>:root { color: #1B2438; }</style>
  <!-- Lock body -->
  <rect x="25" y="60" width="70" height="55" />
  <!-- Lock shackle left -->
  <line x1="38" y1="60" x2="38" y2="35" />
  <!-- Lock shackle right -->
  <line x1="82" y1="60" x2="82" y2="35" />
  <!-- Lock shackle top arc -->
  <polyline points="38,35 42,20 55,12 65,12 78,20 82,35" />
  <!-- Heart-shaped keyhole outer -->
  <polygon points="60,72 54,67 50,72 60,88 70,72 66,67" />
  <!-- Keyhole slot -->
  <line x1="60" y1="85" x2="60" y2="100" />
  <!-- Lock plate accent top -->
  <line x1="30" y1="65" x2="90" y2="65" />
  <!-- Lock plate accent bottom -->
  <line x1="30" y1="110" x2="90" y2="110" />
  <!-- Rivet top left -->
  <circle cx="32" cy="68" r="2" />
  <!-- Rivet top right -->
  <circle cx="88" cy="68" r="2" />
  <!-- Rivet bottom left -->
  <circle cx="32" cy="108" r="2" />
  <!-- Rivet bottom right -->
  <circle cx="88" cy="108" r="2" />
  <!-- Sparkle -->
  <line x1="95" y1="25" x2="100" y2="20" />
  <line x1="98" y1="27" x2="98" y2="18" />
</svg>
