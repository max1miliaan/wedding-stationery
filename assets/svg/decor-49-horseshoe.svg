<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 140" stroke="currentColor" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <style>:root { color: #1B2438; }</style>
  <!-- Horseshoe outer shape -->
  <polyline points="25,110 20,70 22,45 30,28 45,16 60,12 75,16 90,28 98,45 100,70 95,110" />
  <!-- Horseshoe inner shape -->
  <polyline points="38,110 35,72 37,50 42,38 52,28 60,25 68,28 78,38 83,50 85,72 82,110" />
  <!-- Nail hole top left -->
  <circle cx="28" cy="45" r="3" />
  <!-- Nail hole mid left -->
  <circle cx="24" cy="68" r="3" />
  <!-- Nail hole bottom left -->
  <circle cx="27" cy="90" r="3" />
  <!-- Nail hole top right -->
  <circle cx="92" cy="45" r="3" />
  <!-- Nail hole mid right -->
  <circle cx="96" cy="68" r="3" />
  <!-- Nail hole bottom right -->
  <circle cx="93" cy="90" r="3" />
  <!-- Left tip cap -->
  <line x1="25" y1="110" x2="38" y2="110" />
  <!-- Right tip cap -->
  <line x1="82" y1="110" x2="95" y2="110" />
  <!-- Sparkle top -->
  <line x1="60" y1="2" x2="60" y2="8" />
  <line x1="56" y1="5" x2="64" y2="5" />
</svg>
