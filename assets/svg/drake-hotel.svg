<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 120" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <style>:root { color: #1B2438; }</style>

  <!-- Main building outline -- tall narrow Queen Anne facade -->
  <rect x="30" y="20" width="100" height="98" rx="1" />

  <!-- Rooftop / Sky Yard railing -->
  <line x1="30" y1="20" x2="130" y2="20" />
  <line x1="35" y1="15" x2="125" y2="15" />
  <!-- Railing posts -->
  <path d="M 40 15 L 40 20 M 60 15 L 60 20 M 80 15 L 80 20 M 100 15 L 100 20 M 120 15 L 120 20" />

  <!-- Upper floor windows (row of 3) -->
  <rect x="42" y="30" width="14" height="18" rx="1" />
  <rect x="73" y="30" width="14" height="18" rx="1" />
  <rect x="104" y="30" width="14" height="18" rx="1" />

  <!-- Middle floor windows (row of 3) -->
  <rect x="42" y="55" width="14" height="18" rx="1" />
  <rect x="73" y="55" width="14" height="18" rx="1" />
  <rect x="104" y="55" width="14" height="18" rx="1" />

  <!-- Ground level -- entrance awning -->
  <path d="M 55 88 L 55 82 L 105 82 L 105 88" />
  <path d="M 52 82 L 108 82" />

  <!-- Entrance door -->
  <rect x="70" y="88" width="20" height="30" rx="2" />

  <!-- "THE DRAKE" text suggestion (horizontal lines on facade) -->
  <line x1="60" y1="78" x2="100" y2="78" />

  <!-- Neon sign outline on roof -->
  <path d="M 65 10 Q 80 4 95 10" />
</svg>
