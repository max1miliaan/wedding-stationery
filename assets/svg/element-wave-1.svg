<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 100" stroke="currentColor" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <style>:root { color: #1B2438; }</style>
  <!-- Flowing sine wave with varying thickness, like an ocean wave -->
  <!-- Main wave line - thicker stroke for body -->
  <path stroke-width="3" d="
    M 10,50
    C 30,20 55,15 80,30
    C 105,45 115,70 140,72
    C 165,74 175,40 200,30
    C 225,20 240,35 260,50
    C 280,65 295,78 320,70
    C 345,62 355,30 380,25
    C 390,22 395,28 390,35"/>
  <!-- Thinner parallel wave slightly offset, creating depth -->
  <path stroke-width="1.5" opacity="0.6" d="
    M 15,58
    C 35,30 58,24 82,38
    C 106,52 118,76 142,78
    C 166,80 178,48 202,38
    C 226,28 242,42 262,56
    C 282,70 298,82 322,74
    C 346,66 358,36 382,32"/>
  <!-- Wave crest foam details -->
  <path stroke-width="1" opacity="0.4" d="M 72,22 C 78,18 86,20 80,26"/>
  <path stroke-width="1" opacity="0.4" d="M 192,26 C 198,22 206,24 200,30"/>
  <path stroke-width="1" opacity="0.4" d="M 372,22 C 378,18 386,20 382,28"/>
  <!-- Small splash marks at wave peaks -->
  <path stroke-width="1" opacity="0.35" d="M 68,18 C 70,14 74,16 72,20"/>
  <path stroke-width="1" opacity="0.35" d="M 188,22 C 190,18 194,20 192,24"/>
  <path stroke-width="1" opacity="0.35" d="M 368,20 C 370,16 374,18 372,22"/>
</svg>
