<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 70" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
  <style>:root { color: #1B2438; }</style>
  <!-- Body (horizontal, low) -->
  <ellipse cx="60" cy="42" rx="44" ry="18" />
  <!-- Head resting forward -->
  <rect x="75" y="12" width="40" height="28" rx="12" ry="10" />
  <!-- Ear -->
  <polyline points="84,14 80,4 90,12" />
  <polyline points="108,14 112,4 102,12" />
  <!-- Eyes -->
  <circle cx="88" cy="24" r="2.5" fill="currentColor" />
  <circle cx="105" cy="24" r="2.5" fill="currentColor" />
  <!-- Nose -->
  <rect x="90" y="30" width="16" height="7" rx="4" ry="3" />
  <!-- Front paws stretched out -->
  <rect x="94" y="44" width="18" height="8" rx="3" ry="3" />
  <!-- Jowl -->
  <polyline points="86,39 90,42 98,44 106,42 110,39" />
  <!-- Tail stub -->
  <polyline points="16,36 10,32 14,38" />
  <!-- Back paw tucked -->
  <ellipse cx="24" cy="54" rx="8" ry="5" />
  <!-- Paw lines on front -->
  <line x1="100" y1="52" x2="100" y2="49" />
  <line x1="106" y1="52" x2="106" y2="49" />
</svg>
