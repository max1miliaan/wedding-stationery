  <path d="M 28 38 C 26 24, 36 14, 48 12 C 53 11, 63 11, 68 12 C 80 14, 90 24, 88 38 C 88 44, 84 48, 78 50" />
  <path d="M 28 38 C 28 44, 32 48, 38 50" />
