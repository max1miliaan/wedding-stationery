<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 55" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
  <style>:root { color: #1B2438; }</style>
  <!-- Edge line (peeking over something) -->
  <line x1="0" y1="50" x2="120" y2="50" />
