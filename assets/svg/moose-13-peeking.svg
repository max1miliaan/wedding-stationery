  <path d="M 48 40 C 48 37, 52 35, 58 35 C 64 35, 68 37, 68 40 C 68 43, 64 45, 58 45 C 52 45, 48 43, 48 40" />
  <ellipse cx="54" cy="40" rx="2" ry="1.5" />
