<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 65" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
  <style>:root { color: #1B2438; }</style>
  <!-- Head (larger, close-up) -->
  <rect x="5" y="8" width="70" height="45" rx="18" ry="14" />
  <!-- Rose ears -->
  <polyline points="14,14 6,2 22,10" />
  <polyline points="66,14 74,2 58,10" />
  <!-- Eyes (wide-set, expressive) -->
  <circle cx="24" cy="30" r="4.5" fill="currentColor" />
  <circle cx="56" cy="30" r="4.5" fill="currentColor" />
  <!-- Wide flat nose -->
  <rect x="27" y="38" width="26" height="11" rx="6" ry="5" />
  <!-- Nostrils -->
  <circle cx="35" cy="43" r="2.5" />
  <circle cx="45" cy="43" r="2.5" />
  <!-- Underbite jaw -->
  <polyline points="20,52 30,56 40,58 50,56 60,52" />
  <!-- Jowl lines -->
  <line x1="8" y1="38" x2="6" y2="50" />
  <line x1="72" y1="38" x2="74" y2="50" />
  <!-- Wrinkle lines on forehead -->
  <line x1="30" y1="20" x2="36" y2="22" />
  <line x1="50" y1="20" x2="44" y2="22" />
</svg>
