<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 150 85" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
  <style>:root { color: #1B2438; }</style>
  <!-- Head in side profile -->
  <rect x="95" y="5" width="48" height="32" rx="12" ry="10" />
  <!-- Ear -->
  <polyline points="106,8 102,0 112,6" />
  <!-- Eye -->
  <circle cx="125" cy="18" r="3" fill="currentColor" />
  <!-- Nose -->
  <rect x="131" y="24" width="14" height="8" rx="4" ry="3" />
  <!-- Jowl -->
  <line x1="136" y1="36" x2="138" y2="40" />
  <!-- Body -->
  <rect x="30" y="26" width="72" height="28" rx="10" ry="8" />
  <!-- Front legs (extended forward) -->
  <rect x="82" y="46" width="11" height="28" rx="4" />
  <rect x="72" y="50" width="11" height="30" rx="4" />
  <!-- Back legs (extended back) -->
  <rect x="30" y="46" width="11" height="28" rx="4" />
  <rect x="18" y="50" width="11" height="30" rx="4" />
  <!-- Tail stub -->
  <polyline points="30,32 22,28 26,34" />
  <!-- Motion lines -->
  <line x1="10" y1="30" x2="0" y2="30" />
  <line x1="12" y1="38" x2="2" y2="38" />
  <line x1="10" y1="46" x2="0" y2="46" />
</svg>
