<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 130" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
  <style>:root { color: #1B2438; }</style>
  <!-- Head -->
  <rect x="15" y="12" width="70" height="45" rx="18" ry="14" />
  <!-- Rose ears -->
  <polyline points="22,18 14,6 30,14" />
  <polyline points="78,18 86,6 70,14" />
  <!-- Eyes (big, pleading) -->
  <circle cx="35" cy="34" r="4" fill="currentColor" />
  <circle cx="65" cy="34" r="4" fill="currentColor" />
  <!-- Wide flat nose -->
  <rect x="38" y="42" width="24" height="10" rx="5" ry="4" />
  <!-- Underbite jaw -->
  <polyline points="32,56 40,60 50,62 60,60 68,56" />
  <!-- Body -->
  <rect x="22" y="64" width="56" height="40" rx="10" ry="8" />
  <!-- Front paws UP in air (begging) -->
  <rect x="20" y="56" width="12" height="18" rx="4" />
  <rect x="68" y="56" width="12" height="18" rx="4" />
  <!-- Hind legs on ground -->
  <rect x="28" y="96" width="14" height="22" rx="5" />
  <rect x="58" y="96" width="14" height="22" rx="5" />
  <!-- Paw lines -->
  <line x1="33" y1="114" x2="33" y2="110" />
  <line x1="63" y1="114" x2="63" y2="110" />
</svg>
