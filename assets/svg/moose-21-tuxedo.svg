<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 120" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
  <style>:root { color: #1B2438; }</style>
  <!-- Head -->
  <rect x="15" y="12" width="70" height="45" rx="18" ry="14" />
  <!-- Rose ears -->
  <polyline points="22,18 14,6 30,14" />
  <polyline points="78,18 86,6 70,14" />
  <!-- Eyes -->
  <circle cx="35" cy="34" r="3.5" fill="currentColor" />
  <circle cx="65" cy="34" r="3.5" fill="currentColor" />
  <!-- Wide flat nose -->
  <rect x="38" y="42" width="24" height="10" rx="5" ry="4" />
  <!-- Underbite jaw -->
  <polyline points="32,56 40,60 50,62 60,60 68,56" />
  <!-- Bowtie -->
  <polygon points="38,60 46,63 38,66" />
  <polygon points="62,60 54,63 62,66" />
  <circle cx="50" cy="63" r="2.5" />
  <!-- Body (tuxedo) -->
  <rect x="22" y="65" width="56" height="35" rx="10" ry="8" />
  <!-- Lapel lines (V-shape) -->
  <line x1="38" y1="65" x2="50" y2="82" />
  <line x1="62" y1="65" x2="50" y2="82" />
  <!-- Front legs -->
  <rect x="26" y="90" width="14" height="22" rx="5" />
  <rect x="60" y="90" width="14" height="22" rx="5" />
</svg>
