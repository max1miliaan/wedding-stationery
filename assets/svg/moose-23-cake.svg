<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 130" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
  <style>:root { color: #1B2438; }</style>
  <!-- Head -->
  <rect x="40" y="12" width="70" height="45" rx="18" ry="14" />
  <!-- Rose ears -->
  <polyline points="48,18 40,6 56,14" />
  <polyline points="102,18 110,6 96,14" />
  <!-- Eyes -->
  <circle cx="60" cy="34" r="3.5" fill="currentColor" />
  <circle cx="90" cy="34" r="3.5" fill="currentColor" />
  <!-- Wide flat nose -->
  <rect x="63" y="42" width="24" height="10" rx="5" ry="4" />
  <!-- Underbite jaw -->
  <polyline points="58,56 66,60 75,62 84,60 92,56" />
  <!-- Body -->
  <rect x="48" y="60" width="56" height="38" rx="10" ry="8" />
  <!-- Front legs -->
  <rect x="52" y="88" width="14" height="24" rx="5" />
  <rect x="84" y="88" width="14" height="24" rx="5" />
  <!-- Wedding cake (3 tiers, stacked rects) -->
  <rect x="4" y="94" width="32" height="14" rx="3" ry="2" />
  <rect x="8" y="80" width="24" height="14" rx="3" ry="2" />
  <rect x="12" y="66" width="16" height="14" rx="3" ry="2" />
  <!-- Cake topper -->
  <line x1="20" y1="66" x2="20" y2="58" />
  <circle cx="20" cy="56" r="3" />
</svg>
