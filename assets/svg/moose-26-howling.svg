<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 130" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
  <style>:root { color: #1B2438; }</style>
  <!-- Head tilted up: wide rect angled upward -->
  <rect x="15" y="5" width="70" height="42" rx="18" ry="14" />
  <!-- Rose ears flopped back -->
  <polyline points="22,10 14,0 30,8" />
  <polyline points="78,10 86,0 70,8" />
  <!-- Eyes squished closed (howling) -->
  <line x1="30" y1="22" x2="40" y2="22" />
  <line x1="60" y1="22" x2="70" y2="22" />
  <!-- Nose pointed up -->
  <rect x="38" y="30" width="24" height="10" rx="5" ry="4" />
  <!-- Mouth open wide (howling) -->
  <polyline points="36,46 42,50 50,54 58,50 64,46" />
  <polyline points="38,46 50,42 62,46" />
  <!-- Jowl lines -->
  <line x1="18" y1="34" x2="16" y2="46" />
  <line x1="82" y1="34" x2="84" y2="46" />
  <!-- Body -->
  <rect x="22" y="52" width="56" height="38" rx="10" ry="8" />
  <!-- Front legs -->
  <rect x="26" y="82" width="14" height="24" rx="5" />
  <rect x="60" y="82" width="14" height="24" rx="5" />
  <!-- Paw lines -->
  <line x1="31" y1="102" x2="31" y2="98" />
  <line x1="65" y1="102" x2="65" y2="98" />
  <!-- Sound lines -->
  <line x1="44" y1="0" x2="46" y2="4" />
  <line x1="50" y1="0" x2="50" y2="4" />
  <line x1="56" y1="0" x2="54" y2="4" />
</svg>
