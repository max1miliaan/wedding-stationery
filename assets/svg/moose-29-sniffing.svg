<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 140 100" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
  <style>:root { color: #1B2438; }</style>
  <!-- Head angled down, nose to ground -->
  <rect x="82" y="32" width="48" height="32" rx="12" ry="10" />
  <!-- Rose ears -->
  <polyline points="90,34 86,24 96,32" />
  <polyline points="122,34 126,24 116,32" />
  <!-- Eyes -->
  <circle cx="96" cy="44" r="2.5" fill="currentColor" />
  <circle cx="116" cy="44" r="2.5" fill="currentColor" />
  <!-- Nose pressed down (sniffing) -->
  <rect x="98" y="56" width="18" height="9" rx="5" ry="3" />
  <!-- Sniff lines -->
  <line x1="104" y1="68" x2="102" y2="72" />
  <line x1="109" y1="68" x2="109" y2="72" />
  <line x1="114" y1="68" x2="116" y2="72" />
  <!-- Body (rear end up) -->
  <rect x="20" y="18" width="68" height="32" rx="12" ry="8" />
  <!-- Front legs (bent, head low) -->
  <rect x="70" y="48" width="12" height="28" rx="4" />
  <rect x="56" y="50" width="12" height="26" rx="4" />
  <!-- Back legs (straight, butt up) -->
  <rect x="24" y="44" width="12" height="32" rx="4" />
  <rect x="38" y="44" width="12" height="32" rx="4" />
  <!-- Tail up high -->
  <polyline points="20,22 12,10 18,20" />
</svg>
