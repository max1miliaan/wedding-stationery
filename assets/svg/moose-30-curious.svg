<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 120" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
  <style>:root { color: #1B2438; }</style>
  <!-- Head tilted to the side (rotated feel via offset) -->
  <rect x="12" y="10" width="70" height="45" rx="18" ry="14" />
  <!-- Rose ears (asymmetric for tilt) -->
  <polyline points="18,14 8,4 26,12" />
  <polyline points="74,18 84,10 68,16" />
  <!-- Eyes (one slightly higher for tilt) -->
  <circle cx="32" cy="30" r="3.5" fill="currentColor" />
  <circle cx="62" cy="34" r="3.5" fill="currentColor" />
  <!-- Wide flat nose -->
  <rect x="36" y="40" width="24" height="10" rx="5" ry="4" />
  <!-- Underbite jaw -->
  <polyline points="28,54 38,58 48,60 58,58 66,54" />
  <!-- Jowl lines -->
  <line x1="14" y1="40" x2="12" y2="52" />
  <line x1="80" y1="42" x2="82" y2="54" />
  <!-- Question mark above head -->
  <polyline points="78,6 84,2 86,6 80,12" />
  <circle cx="80" cy="16" r="1" fill="currentColor" stroke="none" />
  <!-- Body -->
  <rect x="22" y="58" width="56" height="36" rx="10" ry="8" />
  <!-- Front legs -->
  <rect x="26" y="86" width="14" height="24" rx="5" />
  <rect x="60" y="86" width="14" height="24" rx="5" />
  <!-- Paw lines -->
  <line x1="31" y1="106" x2="31" y2="102" />
  <line x1="65" y1="106" x2="65" y2="102" />
</svg>
