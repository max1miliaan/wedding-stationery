<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 130" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
  <style>:root { color: #1B2438; }</style>
  <!-- Head -->
  <rect x="15" y="12" width="70" height="45" rx="18" ry="14" />
  <!-- Rose ears -->
  <polyline points="22,18 14,6 30,14" />
  <polyline points="78,18 86,6 70,14" />
  <!-- Eyes -->
  <circle cx="35" cy="34" r="3.5" fill="currentColor" />
  <circle cx="65" cy="34" r="3.5" fill="currentColor" />
  <!-- Wide flat nose -->
  <rect x="38" y="42" width="24" height="10" rx="5" ry="4" />
  <!-- Underbite jaw -->
  <polyline points="32,56 40,60 50,62 60,60 68,56" />
  <!-- Body -->
  <rect x="22" y="62" width="56" height="38" rx="10" ry="8" />
  <!-- Right front leg raised (waving) -->
  <rect x="62" y="54" width="14" height="20" rx="5" />
  <!-- Wave motion lines -->
  <line x1="80" y1="54" x2="84" y2="50" />
  <line x1="80" y1="60" x2="84" y2="58" />
  <!-- Left front leg on ground -->
  <rect x="26" y="90" width="14" height="24" rx="5" />
  <!-- Back legs -->
  <rect x="44" y="92" width="14" height="22" rx="5" />
  <!-- Paw lines -->
  <line x1="31" y1="110" x2="31" y2="106" />
  <line x1="36" y1="110" x2="36" y2="106" />
  <line x1="49" y1="110" x2="49" y2="106" />
</svg>
