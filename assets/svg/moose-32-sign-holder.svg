<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 140" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
  <style>:root { color: #1B2438; }</style>
  <!-- Sign board -->
  <rect x="4" y="4" width="56" height="36" rx="3" ry="3" />
  <!-- Sign post -->
  <line x1="32" y1="40" x2="32" y2="90" />
  <!-- Head -->
  <rect x="40" y="42" width="70" height="45" rx="18" ry="14" />
  <!-- Rose ears -->
  <polyline points="48,48 40,36 56,44" />
  <polyline points="102,48 110,36 96,44" />
  <!-- Eyes -->
  <circle cx="60" cy="64" r="3.5" fill="currentColor" />
  <circle cx="90" cy="64" r="3.5" fill="currentColor" />
  <!-- Wide flat nose -->
  <rect x="64" y="72" width="24" height="10" rx="5" ry="4" />
  <!-- Underbite jaw -->
  <polyline points="56,86 64,90 75,92 86,90 94,86" />
  <!-- Body -->
  <rect x="48" y="90" width="56" height="30" rx="10" ry="8" />
  <!-- Front paw holding sign post -->
  <rect x="28" y="82" width="14" height="18" rx="4" />
  <!-- Other front leg -->
  <rect x="86" y="112" width="14" height="22" rx="5" />
  <!-- Back legs -->
  <rect x="52" y="114" width="14" height="20" rx="5" />
  <!-- Paw lines -->
  <line x1="91" y1="130" x2="91" y2="126" />
  <line x1="57" y1="130" x2="57" y2="126" />
</svg>
