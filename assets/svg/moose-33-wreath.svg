<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
  <style>:root { color: #1B2438; }</style>
  <!-- Wreath circle -->
  <circle cx="60" cy="55" r="48" />
  <!-- Wreath leaf accents (small lines around circle) -->
  <line x1="12" y1="45" x2="8" y2="40" />
  <line x1="12" y1="65" x2="8" y2="70" />
  <line x1="108" y1="45" x2="112" y2="40" />
  <line x1="108" y1="65" x2="112" y2="70" />
  <!-- Head poking through wreath center -->
  <rect x="25" y="30" width="70" height="45" rx="18" ry="14" />
  <!-- Rose ears -->
  <polyline points="32,36 24,24 40,32" />
  <polyline points="88,36 96,24 82,32" />
  <!-- Eyes -->
  <circle cx="45" cy="52" r="3.5" fill="currentColor" />
  <circle cx="75" cy="52" r="3.5" fill="currentColor" />
  <!-- Wide flat nose -->
  <rect x="48" y="60" width="24" height="10" rx="5" ry="4" />
  <!-- Underbite jaw -->
  <polyline points="42,74 50,78 60,80 70,78 78,74" />
  <!-- Paws draped over bottom of wreath -->
  <rect x="30" y="94" width="14" height="14" rx="4" />
  <rect x="76" y="94" width="14" height="14" rx="4" />
  <!-- Paw lines -->
  <line x1="35" y1="104" x2="35" y2="100" />
  <line x1="40" y1="104" x2="40" y2="100" />
  <line x1="81" y1="104" x2="81" y2="100" />
  <line x1="86" y1="104" x2="86" y2="100" />
</svg>
