<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 140 110" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
  <style>:root { color: #1B2438; }</style>
  <!-- Banner flag -->
  <polygon points="2,10 40,10 40,30 22,24 2,30" />
  <!-- Banner pole -->
  <line x1="40" y1="6" x2="40" y2="60" />
  <!-- Head (side profile, carrying banner) -->
  <rect x="50" y="16" width="52" height="34" rx="14" ry="11" />
  <!-- Rose ears -->
  <polyline points="58,20 54,10 64,17" />
  <polyline points="94,20 98,10 88,17" />
  <!-- Eyes -->
  <circle cx="66" cy="30" r="3" fill="currentColor" />
  <circle cx="88" cy="30" r="3" fill="currentColor" />
  <!-- Nose -->
  <rect x="70" y="38" width="18" height="8" rx="4" ry="3" />
  <!-- Underbite jaw -->
  <polyline points="60,49 68,52 78,54 88,52 96,49" />
  <!-- Jowl line -->
  <line x1="52" y1="38" x2="50" y2="48" />
  <!-- Body -->
  <rect x="40" y="48" width="64" height="30" rx="10" ry="8" />
  <!-- Front leg holding pole -->
  <rect x="38" y="52" width="12" height="24" rx="4" />
  <!-- Other front leg -->
  <rect x="82" y="72" width="12" height="22" rx="4" />
  <!-- Back legs -->
  <rect x="56" y="72" width="12" height="22" rx="4" />
  <!-- Tail stub -->
  <polyline points="104,54 112,50 106,56" />
  <!-- Paw lines -->
  <line x1="87" y1="90" x2="87" y2="86" />
  <line x1="61" y1="90" x2="61" y2="86" />
</svg>
