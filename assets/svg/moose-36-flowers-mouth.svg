<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 120" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
  <style>:root { color: #1B2438; }</style>
  <!-- Head -->
  <rect x="15" y="12" width="70" height="45" rx="18" ry="14" />
  <!-- Rose ears -->
  <polyline points="22,18 14,6 30,14" />
  <polyline points="78,18 86,6 70,14" />
  <!-- Eyes -->
  <circle cx="35" cy="34" r="3.5" fill="currentColor" />
  <circle cx="65" cy="34" r="3.5" fill="currentColor" />
  <!-- Wide flat nose -->
  <rect x="38" y="42" width="24" height="10" rx="5" ry="4" />
  <!-- Flower stems from mouth -->
  <line x1="50" y1="56" x2="42" y2="28" />
  <line x1="50" y1="56" x2="50" y2="24" />
  <line x1="50" y1="56" x2="58" y2="26" />
  <!-- Flowers (simple circles) -->
  <circle cx="42" cy="24" r="5" />
  <circle cx="42" cy="24" r="2" fill="currentColor" stroke="none" />
  <circle cx="50" cy="20" r="5" />
  <circle cx="50" cy="20" r="2" fill="currentColor" stroke="none" />
  <circle cx="58" cy="22" r="5" />
  <circle cx="58" cy="22" r="2" fill="currentColor" stroke="none" />
  <!-- Underbite jaw holding stems -->
  <polyline points="32,56 40,60 50,58 60,60 68,56" />
  <!-- Body -->
  <rect x="22" y="62" width="56" height="34" rx="10" ry="8" />
  <!-- Front legs -->
  <rect x="26" y="88" width="14" height="24" rx="5" />
  <rect x="60" y="88" width="14" height="24" rx="5" />
</svg>
