<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 120" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
  <style>:root { color: #1B2438; }</style>
  <!-- Head -->
  <rect x="15" y="12" width="70" height="45" rx="18" ry="14" />
  <!-- Rose ears -->
  <polyline points="22,18 14,6 30,14" />
  <polyline points="78,18 86,6 70,14" />
  <!-- Eyes (focused, looking up at treat) -->
  <circle cx="35" cy="34" r="3" fill="currentColor" />
  <circle cx="65" cy="34" r="3" fill="currentColor" />
  <!-- Wide flat nose -->
  <rect x="38" y="42" width="24" height="10" rx="5" ry="4" />
  <!-- Treat balancing on nose -->
  <rect x="44" y="36" width="12" height="6" rx="2" ry="2" />
  <!-- Underbite jaw (closed, concentrating) -->
  <polyline points="36,56 44,58 50,59 56,58 64,56" />
  <!-- Jowl lines -->
  <line x1="18" y1="42" x2="16" y2="55" />
  <line x1="82" y1="42" x2="84" y2="55" />
  <!-- Body -->
  <rect x="22" y="60" width="56" height="36" rx="10" ry="8" />
  <!-- Front legs (straight, sitting still) -->
  <rect x="26" y="88" width="14" height="24" rx="5" />
  <rect x="60" y="88" width="14" height="24" rx="5" />
  <!-- Paw lines -->
  <line x1="31" y1="108" x2="31" y2="104" />
  <line x1="36" y1="108" x2="36" y2="104" />
  <line x1="65" y1="108" x2="65" y2="104" />
  <line x1="70" y1="108" x2="70" y2="104" />
</svg>
