<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 130 80" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
  <style>:root { color: #1B2438; }</style>
  <!-- Body (on back, belly up, horizontal) -->
  <ellipse cx="65" cy="42" rx="42" ry="22" />
  <!-- Belly line -->
  <line x1="40" y1="42" x2="90" y2="42" />
  <!-- Head (upside down, to the right) -->
  <rect x="88" y="24" width="38" height="28" rx="12" ry="10" />
  <!-- Ears flopped -->
  <polyline points="94,50 90,58 98,52" />
  <polyline points="120,50 124,58 116,52" />
  <!-- Eyes (happy, upside down) -->
  <circle cx="100" cy="36" r="2.5" fill="currentColor" />
  <circle cx="118" cy="36" r="2.5" fill="currentColor" />
  <!-- Nose -->
  <rect x="103" y="40" width="14" height="7" rx="4" ry="3" />
  <!-- Tongue lolling -->
  <ellipse cx="110" cy="50" rx="4" ry="3" />
  <!-- Front paws in air -->
  <rect x="82" y="10" width="10" height="16" rx="4" />
  <rect x="96" y="8" width="10" height="16" rx="4" />
  <!-- Back paws in air -->
  <rect x="30" y="12" width="10" height="16" rx="4" />
  <rect x="44" y="10" width="10" height="16" rx="4" />
  <!-- Tail on ground -->
  <polyline points="24,38 16,34 22,40" />
</svg>
