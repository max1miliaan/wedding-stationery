<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 100" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
  <style>:root { color: #1B2438; }</style>
  <!-- Window frame outer -->
  <rect x="10" y="6" width="100" height="88" rx="4" ry="4" />
  <!-- Window frame inner -->
  <rect x="18" y="14" width="84" height="72" rx="2" ry="2" />
  <!-- Window divider vertical -->
  <line x1="60" y1="14" x2="60" y2="86" />
  <!-- Window divider horizontal -->
  <line x1="18" y1="50" x2="102" y2="50" />
  <!-- Head peeking in lower right pane -->
  <rect x="30" y="38" width="58" height="38" rx="16" ry="12" />
  <!-- Rose ears -->
  <polyline points="36,42 30,32 42,38" />
  <polyline points="82,42 88,32 76,38" />
  <!-- Eyes (wide, looking in) -->
  <circle cx="46" cy="54" r="3.5" fill="currentColor" />
  <circle cx="72" cy="54" r="3.5" fill="currentColor" />
  <!-- Wide flat nose -->
  <rect x="48" y="62" width="22" height="9" rx="5" ry="4" />
  <!-- Paws on window sill -->
  <rect x="32" y="76" width="14" height="12" rx="4" />
  <rect x="72" y="76" width="14" height="12" rx="4" />
  <!-- Paw lines -->
  <line x1="37" y1="84" x2="37" y2="80" />
  <line x1="42" y1="84" x2="42" y2="80" />
  <line x1="77" y1="84" x2="77" y2="80" />
  <line x1="82" y1="84" x2="82" y2="80" />
</svg>
