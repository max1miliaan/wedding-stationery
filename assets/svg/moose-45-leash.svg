<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 140 100" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
  <style>:root { color: #1B2438; }</style>
  <!-- Leash line (draped curve via polyline) -->
  <polyline points="130,4 120,18 112,28 106,34" />
  <!-- Collar circle at neck -->
  <circle cx="106" cy="38" r="4" />
  <!-- Head (side profile, walking forward) -->
  <rect x="88" y="8" width="48" height="32" rx="12" ry="10" />
  <!-- Rose ear -->
  <polyline points="96,10 92,2 102,8" />
  <!-- Eye -->
  <circle cx="118" cy="20" r="3" fill="currentColor" />
  <!-- Nose -->
  <rect x="124" y="26" width="14" height="8" rx="4" ry="3" />
  <!-- Nostril -->
  <circle cx="133" cy="30" r="1.5" />
  <!-- Jowl -->
  <line x1="128" y1="38" x2="130" y2="42" />
  <!-- Body -->
  <rect x="30" y="30" width="66" height="30" rx="10" ry="8" />
  <!-- Front legs (walking stride) -->
  <rect x="76" y="54" width="12" height="26" rx="4" />
  <rect x="62" y="58" width="12" height="22" rx="4" />
  <!-- Back legs -->
  <rect x="34" y="54" width="12" height="26" rx="4" />
  <rect x="48" y="58" width="12" height="22" rx="4" />
  <!-- Tail stub -->
  <polyline points="30,36 22,30 28,38" />
  <!-- Paw lines -->
  <line x1="81" y1="76" x2="81" y2="72" />
  <line x1="39" y1="76" x2="39" y2="72" />
</svg>
