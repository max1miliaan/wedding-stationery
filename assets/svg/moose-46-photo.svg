<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 140 120" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
  <style>:root { color: #1B2438; }</style>
  <!-- Camera on tripod (left side) -->
  <rect x="4" y="34" width="28" height="20" rx="4" ry="4" />
  <!-- Camera lens -->
  <circle cx="32" cy="44" r="6" />
  <circle cx="32" cy="44" r="3" />
  <!-- Camera flash -->
  <rect x="10" y="28" width="10" height="6" rx="2" ry="2" />
  <!-- Tripod legs -->
  <line x1="12" y1="54" x2="4" y2="80" />
  <line x1="18" y1="54" x2="18" y2="82" />
  <line x1="24" y1="54" x2="32" y2="80" />
  <!-- Head (posing, front view) -->
  <rect x="55" y="16" width="70" height="45" rx="18" ry="14" />
  <!-- Rose ears -->
  <polyline points="62,22 54,10 70,18" />
  <polyline points="118,22 126,10 112,18" />
  <!-- Eyes (happy pose) -->
  <circle cx="75" cy="38" r="3.5" fill="currentColor" />
  <circle cx="105" cy="38" r="3.5" fill="currentColor" />
  <!-- Wide flat nose -->
  <rect x="78" y="46" width="24" height="10" rx="5" ry="4" />
  <!-- Underbite jaw (slight smile) -->
  <polyline points="72,60 80,64 90,66 100,64 108,60" />
  <!-- Body -->
  <rect x="62" y="64" width="56" height="34" rx="10" ry="8" />
  <!-- Front legs -->
  <rect x="66" y="90" width="14" height="22" rx="5" />
  <rect x="100" y="90" width="14" height="22" rx="5" />
  <!-- Paw lines -->
  <line x1="71" y1="108" x2="71" y2="104" />
  <line x1="105" y1="108" x2="105" y2="104" />
</svg>
