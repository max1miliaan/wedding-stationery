<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 130" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
  <style>:root { color: #1B2438; }</style>
  <!-- Royal crown -->
  <polygon points="28,18 22,2 36,12 50,0 64,12 78,2 72,18" />
  <!-- Crown base band -->
  <rect x="28" y="16" width="44" height="6" rx="1" ry="1" />
  <!-- Crown jewels -->
  <circle cx="50" cy="6" r="2" fill="currentColor" stroke="none" />
  <circle cx="36" cy="12" r="1.5" fill="currentColor" stroke="none" />
  <circle cx="64" cy="12" r="1.5" fill="currentColor" stroke="none" />
  <!-- Head -->
  <rect x="15" y="20" width="70" height="45" rx="18" ry="14" />
  <!-- Rose ears -->
  <polyline points="22,26 14,14 30,22" />
  <polyline points="78,26 86,14 70,22" />
  <!-- Eyes (regal) -->
  <circle cx="35" cy="42" r="3.5" fill="currentColor" />
  <circle cx="65" cy="42" r="3.5" fill="currentColor" />
  <!-- Wide flat nose -->
  <rect x="38" y="50" width="24" height="10" rx="5" ry="4" />
  <!-- Underbite jaw -->
  <polyline points="32,64 40,68 50,70 60,68 68,64" />
  <!-- Body -->
  <rect x="22" y="68" width="56" height="36" rx="10" ry="8" />
  <!-- Front legs -->
  <rect x="26" y="96" width="14" height="24" rx="5" />
  <rect x="60" y="96" width="14" height="24" rx="5" />
  <!-- Paw lines -->
  <line x1="31" y1="116" x2="31" y2="112" />
  <line x1="65" y1="116" x2="65" y2="112" />
</svg>
