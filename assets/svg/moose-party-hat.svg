<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 130 155" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <!-- English bulldog sitting with party hat -- playful, head slightly tilted -->

  <!-- Party hat -->
  <path d="M 62 4 L 44 42 L 82 42 Z" />
  <!-- Pom-pom on top -->
  <circle cx="62" cy="4" r="4" />
  <!-- Hat stripes -->
  <path d="M 55 22 L 69 22" />
  <path d="M 52 30 L 72 30" />
  <path d="M 49 36 L 75 36" />

  <!-- Hat elastic strap -->
  <path d="M 44 42 C 42 44, 38 45, 34 44" />
  <path d="M 82 42 C 84 44, 90 46, 95 46" />

  <!-- Head: slightly tilted for playful look (rotated ~5 degrees) -->
  <path d="M 28 50 C 26 34, 38 22, 52 20 C 58 19, 72 19, 78 22 C 92 26, 102 38, 100 52 C 100 60, 94 66, 86 70 C 76 74, 56 74, 46 70 C 36 66, 28 58, 28 50" />

  <!-- Forehead wrinkles -->
  <path d="M 42 32 C 48 29, 56 29, 60 32" />
  <path d="M 68 30 C 74 28, 82 28, 86 32" />
  <path d="M 48 36 C 56 34, 72 34, 80 36" />

  <!-- Rose ears (poking out from under hat) -->
  <path d="M 32 34 C 28 26, 22 24, 20 30 C 19 34, 22 38, 28 38" />
  <path d="M 96 36 C 100 28, 106 26, 108 32 C 109 36, 106 40, 100 40" />

  <!-- Eyes (happy, slightly squinted) -->
  <circle cx="48" cy="48" r="4" fill="currentColor" />
  <circle cx="80" cy="48" r="4" fill="currentColor" />
  <circle cx="46" cy="46" r="1.5" fill="white" stroke="none" />
  <circle cx="78" cy="46" r="1.5" fill="white" stroke="none" />

  <!-- Wide flat nose -->
  <path d="M 54 56 C 54 52, 58 50, 64 50 C 70 50, 74 52, 74 56 C 74 60, 70 62, 64 62 C 58 62, 54 60, 54 56" />
  <ellipse cx="60" cy="56" rx="2.5" ry="2" />
  <ellipse cx="68" cy="56" rx="2.5" ry="2" />

  <!-- Happy underbite with tongue -->
  <path d="M 50 66 C 55 63, 60 62, 64 64 C 68 62, 74 63, 78 66" />
  <path d="M 58 66 L 58 63" />
  <path d="M 70 66 L 70 63" />
  <!-- Tongue out -->
  <path d="M 62 66 C 62 70, 64 73, 66 72 C 68 71, 68 68, 66 66" />

  <!-- Jowls -->
  <path d="M 38 58 C 34 62, 34 68, 40 72" />
  <path d="M 90 58 C 94 62, 94 68, 88 72" />

  <!-- Neck rolls -->
  <path d="M 36 72 C 44 76, 56 78, 64 78" />
  <path d="M 92 72 C 84 76, 72 78, 64 78" />

  <!-- Body -->
  <path d="M 38 82 C 32 90, 28 102, 26 114 C 25 120, 28 126, 32 130" />
  <path d="M 90 82 C 96 90, 100 102, 102 114 C 103 120, 100 126, 96 130" />

  <!-- Front legs -->
  <path d="M 40 106 C 39 114, 38 124, 37 136" />
  <path d="M 50 108 C 49 116, 48 126, 47 136" />
  <path d="M 78 108 C 79 116, 80 126, 81 136" />
  <path d="M 88 106 C 89 114, 90 124, 91 136" />

  <!-- Big paws -->
  <path d="M 32 136 C 34 141, 38 142, 42 141 C 46 142, 50 141, 52 136" />
  <path d="M 76 136 C 78 141, 82 142, 86 141 C 90 142, 94 141, 96 136" />
  <path d="M 38 140 L 38 137" />
  <path d="M 42 141 L 42 138" />
  <path d="M 46 140 L 46 137" />
  <path d="M 82 140 L 82 137" />
  <path d="M 86 141 L 86 138" />
  <path d="M 90 140 L 90 137" />

  <!-- Round belly -->
  <path d="M 32 130 C 48 138, 80 138, 96 130" />
</svg>
