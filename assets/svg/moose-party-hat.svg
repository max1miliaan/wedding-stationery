<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 135" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
  <style>:root { color: #1B2438; }</style>

  <!-- Party hat: cone on top of head -->
  <path d="M 50,3 L 32,38 L 68,38 Z" />
  <!-- Pom-pom on top -->
  <circle cx="50" cy="3" r="3.8" />
  <!-- Hat stripe -->
  <path d="M 43,22 L 57,22" />
  <!-- Hat stripe lower -->
  <path d="M 39,30 L 61,30" />

  <!-- Head: wide flat-topped bulldog shape, jowls droop -->
  <path d="M 16,58 C 13,41 26,27 50,25 C 74,27 87,41 84,58 C 86,68 79,75 71,78 C 63,81 58,80 50,80 C 42,80 37,81 29,78 C 21,75 14,68 16,58 Z" />

  <!-- Left jowl droop -->
  <path d="M 18,61 C 15,66 16,72 22,76 C 25,77 28,77 29,78" />

  <!-- Right jowl droop -->
  <path d="M 82,61 C 85,66 84,72 78,76 C 75,77 72,77 71,78" />

  <!-- Rose ear left: peeking from under hat -->
  <path d="M 26,35 C 22,28 16,27 17,33 C 17,36 21,38 24,36" />

  <!-- Rose ear right: peeking from under hat -->
  <path d="M 74,35 C 78,28 84,27 83,33 C 83,36 79,38 76,36" />

  <!-- Eyes: happy squinty arcs -->
  <path d="M 31,52 C 33,48 38,48 40,52" stroke-width="2.8" />
  <path d="M 60,52 C 62,48 67,48 69,52" stroke-width="2.8" />

  <!-- Wide flat nose -->
  <path d="M 39,63 C 39,59 43,57 50,57 C 57,57 61,59 61,63 C 61,66 57,68 50,68 C 43,68 39,66 39,63 Z" />
  <!-- Nostrils -->
  <circle cx="44" cy="63" r="1.5" fill="currentColor" />
  <circle cx="56" cy="63" r="1.5" fill="currentColor" />

  <!-- Tongue sticking out (happy!) -->
  <path d="M 46,72 C 46,76 49,79 52,77 C 54,75 53,72 50,71" />

  <!-- Underbite: lower jaw -->
  <path d="M 36,72 C 40,70 45,69 50,69 C 55,69 60,70 64,72" />
  <path d="M 36,72 C 38,75 43,77 50,77 C 57,77 62,75 64,72" />

  <!-- Forehead wrinkles (under hat) -->
  <path d="M 36,43 C 41,41 46,40 50,40 C 54,40 59,41 64,43" />

  <!-- Body: barrel-chested, stocky -->
  <path d="M 28,80 C 24,88 22,97 22,106 C 22,110 24,112 27,114" />
  <path d="M 72,80 C 76,88 78,97 78,106 C 78,110 76,112 73,114" />

  <!-- Belly curve -->
  <path d="M 27,114 C 38,121 62,121 73,114" />

  <!-- Left front leg -->
  <path d="M 26,102 L 25,121 C 25,125 36,125 36,121 L 37,104" />
  <!-- Paw toe lines -->
  <line x1="28" y1="124" x2="28" y2="121" />
  <line x1="33" y1="124" x2="33" y2="121" />

  <!-- Right front leg -->
  <path d="M 63,104 L 64,121 C 64,125 75,125 75,121 L 74,102" />
  <!-- Paw toe lines -->
  <line x1="67" y1="124" x2="67" y2="121" />
  <line x1="72" y1="124" x2="72" y2="121" />
</svg>
