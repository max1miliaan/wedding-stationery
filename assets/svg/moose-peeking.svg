<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 80" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <!-- English bulldog peeking over an edge -- just head top, ears, eyes, nose, and paws -->

  <!-- Edge/ledge line -->
  <line x1="0" y1="42" x2="35" y2="42" />
  <line x1="125" y1="42" x2="160" y2="42" />

  <!-- Head top (above the ledge) -->
  <path d="M 42 42 C 40 25, 50 12, 65 10 C 72 9, 88 9, 95 10 C 110 12, 120 25, 118 42" />

  <!-- Forehead wrinkles -->
  <path d="M 58 18 C 64 15, 72 15, 78 18" />
  <path d="M 82 18 C 88 15, 94 16, 98 19" />
  <path d="M 62 23 C 70 20, 86 20, 94 23" />

  <!-- Rose ears -->
  <path d="M 46 22 C 40 14, 34 12, 32 18 C 31 22, 35 26, 40 26" />
  <path d="M 114 22 C 120 14, 126 12, 128 18 C 129 22, 125 26, 120 26" />

  <!-- Eyes (wide, curious, looking upward) -->
  <circle cx="62" cy="32" r="5" fill="currentColor" />
  <circle cx="98" cy="32" r="5" fill="currentColor" />
  <!-- Larger highlights for curious expression -->
  <circle cx="60" cy="30" r="2" fill="white" stroke="none" />
  <circle cx="96" cy="30" r="2" fill="white" stroke="none" />

  <!-- Wide flat nose (partially visible above edge) -->
  <path d="M 72 40 C 72 37, 75 35, 80 35 C 85 35, 88 37, 88 40" />
  <ellipse cx="76" cy="39" rx="2" ry="1.5" />
  <ellipse cx="84" cy="39" rx="2" ry="1.5" />

  <!-- Front paws gripping the edge -->
  <!-- Left paw -->
  <path d="M 40 42 C 40 48, 38 55, 38 60 C 38 64, 42 66, 46 65 C 50 64, 54 62, 55 58 C 56 54, 55 48, 55 42" />
  <!-- Right paw -->
  <path d="M 105 42 C 105 48, 103 55, 103 60 C 103 64, 107 66, 111 65 C 115 64, 119 62, 120 58 C 121 54, 120 48, 120 42" />

  <!-- Toe lines on paws -->
  <path d="M 43 62 L 43 56" />
  <path d="M 47 63 L 47 57" />
  <path d="M 51 62 L 51 56" />
  <path d="M 108 62 L 108 56" />
  <path d="M 112 63 L 112 57" />
  <path d="M 116 62 L 116 56" />
</svg>
