<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 130 60" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
  <style>:root { color: #1B2438; }</style>

  <!-- Edge line (surface Moose peeks over) -->
  <line x1="0" y1="33" x2="24" y2="33" />
  <line x1="106" y1="33" x2="130" y2="33" />

  <!-- Head: wide flat forehead visible above edge -->
  <!-- Flat across top, wide cheeks, comes down to the edge line -->
  <path d="M 30,33 C 28,22 34,10 48,6 C 56,4 74,4 82,6 C 96,10 102,22 100,33" />

  <!-- Left jowl just visible at edge -->
  <path d="M 30,33 C 28,30 27,26 30,24" />

  <!-- Right jowl just visible at edge -->
  <path d="M 100,33 C 102,30 103,26 100,24" />

  <!-- Rose ear left: tiny fold on top of flat head -->
  <path d="M 40,10 C 36,3 30,2 31,9 C 31,12 35,14 38,12" />

  <!-- Rose ear right: tiny fold -->
  <path d="M 90,10 C 94,3 100,2 99,9 C 99,12 95,14 92,12" />

  <!-- Eyes: big, wide-set, curious, low on the visible head -->
  <circle cx="48" cy="22" r="3.8" fill="currentColor" />
  <circle cx="82" cy="22" r="3.8" fill="currentColor" />
  <!-- Eyebrow raise (curious) -->
  <path d="M 44,16 C 46,14 50,14 52,16" />
  <path d="M 78,16 C 80,14 84,14 86,16" />

  <!-- Wide flat nose sitting right on the edge line -->
  <path d="M 57,33 C 57,28 61,26 65,26 C 69,26 73,28 73,33" />
  <!-- Nostrils -->
  <circle cx="61" cy="30" r="1.4" fill="currentColor" />
  <circle cx="69" cy="30" r="1.4" fill="currentColor" />

  <!-- Forehead wrinkle -->
  <path d="M 50,15 C 56,13 63,12 70,13 C 74,14 78,15 80,16" />

  <!-- Left paw hanging over edge, chunky -->
  <path d="M 26,33 L 26,48 C 26,52 38,52 38,48 L 38,33" />
  <!-- Paw toe lines -->
  <line x1="29" y1="51" x2="29" y2="48" />
  <line x1="32" y1="52" x2="32" y2="48" />
  <line x1="35" y1="51" x2="35" y2="48" />

  <!-- Right paw hanging over edge, chunky -->
  <path d="M 92,33 L 92,48 C 92,52 104,52 104,48 L 104,33" />
  <!-- Paw toe lines -->
  <line x1="95" y1="51" x2="95" y2="48" />
  <line x1="98" y1="52" x2="98" y2="48" />
  <line x1="101" y1="51" x2="101" y2="48" />
</svg>
