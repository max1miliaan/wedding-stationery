<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 120" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
  <style>:root { color: #1B2438; }</style>

  <!-- Head: wide flat-topped bulldog shape, jowls droop down -->
  <path d="M 16,44 C 13,26 26,11 50,9 C 74,11 87,26 84,44 C 86,54 79,61 71,64 C 63,67 58,66 50,66 C 42,66 37,67 29,64 C 21,61 14,54 16,44 Z" />

  <!-- Left jowl droop -->
  <path d="M 18,47 C 15,52 16,58 22,62 C 25,63 28,63 29,64" />

  <!-- Right jowl droop -->
  <path d="M 82,47 C 85,52 84,58 78,62 C 75,63 72,63 71,64" />

  <!-- Rose ear left: tiny folded flap -->
  <path d="M 25,19 C 22,11 16,10 17,17 C 17,20 21,22 24,20" />

  <!-- Rose ear right: tiny folded flap -->
  <path d="M 75,19 C 78,11 84,10 83,17 C 83,20 79,22 76,20" />

  <!-- Eyes: wide-set, low on face, filled -->
  <circle cx="34" cy="38" r="3.2" fill="currentColor" />
  <circle cx="66" cy="38" r="3.2" fill="currentColor" />

  <!-- Wide flat nose: pushed in, brachycephalic -->
  <path d="M 39,49 C 39,45 43,43 50,43 C 57,43 61,45 61,49 C 61,52 57,54 50,54 C 43,54 39,52 39,49 Z" />
  <!-- Nostrils -->
  <circle cx="44" cy="49" r="1.5" fill="currentColor" />
  <circle cx="56" cy="49" r="1.5" fill="currentColor" />

  <!-- Underbite: lower jaw juts forward, with two small teeth -->
  <path d="M 35,57 C 39,55 44,54 50,54 C 56,54 61,55 65,57" />
  <!-- Lower jaw curve -->
  <path d="M 35,57 C 37,60 43,62 50,62 C 57,62 63,60 65,57" />
  <!-- Two small teeth poking up -->
  <line x1="44" y1="57" x2="44" y2="55" />
  <line x1="56" y1="57" x2="56" y2="55" />

  <!-- Wrinkle lines on forehead -->
  <path d="M 33,28 C 38,26 44,25 50,25 C 56,25 62,26 67,28" />
  <path d="M 36,32 C 40,30 46,29 50,29 C 54,29 60,30 64,32" />

  <!-- Bowtie at neck -->
  <path d="M 36,72 L 47,68 L 47,76 Z" />
  <path d="M 64,72 L 53,68 L 53,76 Z" />
  <circle cx="50" cy="72" r="2.8" />

  <!-- Body: barrel-chested, stocky -->
  <path d="M 28,66 C 24,74 22,83 22,92 C 22,96 24,98 27,100" />
  <path d="M 72,66 C 76,74 78,83 78,92 C 78,96 76,98 73,100" />

  <!-- Belly curve -->
  <path d="M 27,100 C 38,107 62,107 73,100" />

  <!-- Left front leg: short, bowed, wide paw -->
  <path d="M 26,88 L 25,107 C 25,111 36,111 36,107 L 37,90" />
  <!-- Paw toe lines -->
  <line x1="28" y1="110" x2="28" y2="107" />
  <line x1="33" y1="110" x2="33" y2="107" />

  <!-- Right front leg: short, bowed, wide paw -->
  <path d="M 63,90 L 64,107 C 64,111 75,111 75,107 L 74,88" />
  <!-- Paw toe lines -->
  <line x1="67" y1="110" x2="67" y2="107" />
  <line x1="72" y1="110" x2="72" y2="107" />
</svg>
