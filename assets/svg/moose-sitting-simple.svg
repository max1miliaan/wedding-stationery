  <path d="M 32 58 C 27 66, 24 78, 22 88 C 21 94, 24 98, 28 102" />
  <path d="M 78 58 C 83 66, 86 78, 88 88 C 89 94, 86 98, 82 102" />

  <!-- Front legs -->
  <path d="M 34 82 C 33 88, 32 96, 31 106" />
  <path d="M 42 84 C 41 90, 40 98, 39 106" />
  <path d="M 68 84 C 69 90, 70 98, 71 106" />
  <path d="M 76 82 C 77 88, 78 96, 79 106" />

  <!-- Paws -->
