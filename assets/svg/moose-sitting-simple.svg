<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 100" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
  <style>:root { color: #1B2438; }</style>

  <!-- Head: wide flat-topped bulldog, jowls droop, width > height -->
  <path d="M 10,36 C 8,20 18,8 40,6 C 62,8 72,20 70,36 C 72,45 66,51 59,53 C 52,55 48,54 40,54 C 32,54 28,55 21,53 C 14,51 8,45 10,36 Z" />

  <!-- Left jowl droop -->
  <path d="M 12,39 C 9,43 10,48 15,51 C 18,52 20,52 21,53" />

  <!-- Right jowl droop -->
  <path d="M 68,39 C 71,43 70,48 65,51 C 62,52 60,52 59,53" />

  <!-- Rose ear left -->
  <path d="M 20,14 C 17,7 12,6 13,12 C 13,15 16,17 19,15" />

  <!-- Rose ear right -->
  <path d="M 60,14 C 63,7 68,6 67,12 C 67,15 64,17 61,15" />

  <!-- Eyes: wide-set, low on face -->
  <circle cx="28" cy="30" r="2.8" fill="currentColor" />
  <circle cx="52" cy="30" r="2.8" fill="currentColor" />

  <!-- Wide flat nose -->
  <path d="M 32,40 C 32,37 35,35 40,35 C 45,35 48,37 48,40 C 48,43 45,44 40,44 C 35,44 32,43 32,40 Z" />
  <!-- Nostrils -->
  <circle cx="36" cy="40" r="1.3" fill="currentColor" />
  <circle cx="44" cy="40" r="1.3" fill="currentColor" />

  <!-- Underbite -->
  <path d="M 29,47 C 33,45 36,44 40,44 C 44,44 47,45 51,47" />
  <path d="M 29,47 C 31,50 35,51 40,51 C 45,51 49,50 51,47" />

  <!-- Forehead wrinkle -->
  <path d="M 27,22 C 31,20 36,19 40,19 C 44,19 49,20 53,22" />

  <!-- Body: barrel-chested -->
  <path d="M 20,54 C 17,62 15,70 15,77 C 15,80 17,82 19,84" />
  <path d="M 60,54 C 63,62 65,70 65,77 C 65,80 63,82 61,84" />

  <!-- Belly -->
  <path d="M 19,84 C 28,90 52,90 61,84" />

  <!-- Left front leg -->
  <path d="M 18,74 L 17,90 C 17,93 27,93 27,90 L 28,76" />
  <!-- Toe lines -->
  <line x1="20" y1="92" x2="20" y2="90" />
  <line x1="24" y1="92" x2="24" y2="90" />

  <!-- Right front leg -->
  <path d="M 52,76 L 53,90 C 53,93 63,93 63,90 L 62,74" />
  <!-- Toe lines -->
  <line x1="56" y1="92" x2="56" y2="90" />
  <line x1="60" y1="92" x2="60" y2="90" />
</svg>
