  <path d="M 25 38 C 23 24, 33 14, 45 12 C 50 11, 60 11, 65 12 C 77 14, 87 24, 85 38 C 85 46, 80 52, 72 55 C 64 58, 46 58, 38 55 C 30 52, 25 46, 25 38" />

