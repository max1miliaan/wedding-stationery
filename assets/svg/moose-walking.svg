<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 140 85" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
  <style>:root { color: #1B2438; }</style>

  <!-- Head in profile: flat face, wide jaw, brachycephalic -->
  <!-- Top of skull flat, face nearly vertical, heavy jowl underneath -->
  <path d="M 96,12 C 104,9 116,13 120,22 C 122,28 122,34 120,38 C 119,41 117,43 115,44 C 112,46 106,47 102,46 C 98,45 94,42 92,38 C 89,32 90,18 96,12 Z" />

  <!-- Flat face line (nearly vertical, pushed in) -->
  <path d="M 120,22 C 122,26 123,32 122,37" />

  <!-- Jowl droop in profile -->
  <path d="M 92,38 C 90,42 92,46 96,47 C 100,47 102,46 102,46" />

  <!-- Rose ear (one visible in profile, tiny) -->
  <path d="M 96,12 C 92,6 87,6 88,12 C 88,15 91,17 94,15" />

  <!-- Eye -->
  <circle cx="108" cy="24" r="2.8" fill="currentColor" />

  <!-- Flat wide nose in profile -->
  <path d="M 121,30 C 124,30 126,33 125,36 C 124,38 121,38 121,35" />
  <!-- Nostril -->
  <circle cx="123" cy="34" r="1.2" fill="currentColor" />

  <!-- Underbite: lower jaw extends past upper -->
  <path d="M 115,44 C 118,43 122,44 125,46" />
  <!-- Small tooth -->
  <line x1="119" y1="44" x2="120" y2="42" />

  <!-- Tongue hanging out (happy) -->
  <path d="M 118,46 C 120,49 122,52 120,54 C 118,55 116,52 117,48" />

  <!-- Wrinkle on face -->
  <path d="M 106,18 C 110,17 114,18 116,20" />

  <!-- Neck (thick) -->
  <path d="M 92,34 C 86,32 80,30 74,30" />
  <path d="M 96,47 C 90,50 84,51 78,50" />

  <!-- Body: long barrel, low to ground -->
  <path d="M 74,30 C 60,26 42,25 28,28 C 22,30 18,33 16,36" />
  <path d="M 78,50 C 66,54 48,56 34,54 C 26,52 20,48 18,44" />

  <!-- Front right leg (forward stride) -->
  <path d="M 80,48 L 86,68 C 86,72 92,72 92,68 L 88,50" />
  <!-- Paw toes -->
  <line x1="88" y1="71" x2="88" y2="68" />

  <!-- Front left leg (back stride) -->
  <path d="M 66,52 L 60,68 C 60,72 66,72 66,68 L 68,54" />
  <!-- Paw toes -->
  <line x1="62" y1="71" x2="62" y2="68" />

  <!-- Back right leg (back stride) -->
  <path d="M 40,50 L 46,68 C 46,72 52,72 52,68 L 48,52" />
  <!-- Paw toes -->
  <line x1="48" y1="71" x2="48" y2="68" />

  <!-- Back left leg (forward stride) -->
  <path d="M 28,48 L 22,68 C 22,72 28,72 28,68 L 30,50" />
  <!-- Paw toes -->
  <line x1="24" y1="71" x2="24" y2="68" />

  <!-- Tail: short stubby curl up on left side -->
  <path d="M 18,34 C 14,30 12,24 14,20 C 15,18 18,18 17,22" />
</svg>
