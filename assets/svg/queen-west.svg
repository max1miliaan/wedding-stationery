<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 80" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <style>:root { color: #1B2438; }</style>

  <!-- Ground line -->
  <line x1="0" y1="75" x2="200" y2="75" />

  <!-- Building 1 -- tall narrow shop -->
  <path d="M 5 75 L 5 25 L 33 25 L 33 75" />
  <rect x="10" y="32" width="8" height="10" rx="1" />
  <rect x="20" y="32" width="8" height="10" rx="1" />
  <rect x="12" y="60" width="14" height="15" rx="1" />

  <!-- Building 2 -- peaked roof -->
  <path d="M 36 75 L 36 35 L 66 35 L 66 75" />
  <path d="M 34 35 L 51 22 L 68 35" />
  <rect x="42" y="42" width="8" height="8" rx="1" />
  <rect x="44" y="60" width="12" height="15" rx="1" />

  <!-- Building 3 -- gallery with big window -->
  <path d="M 70 75 L 70 30 L 105 30 L 105 75" />
  <rect x="74" y="36" width="27" height="12" rx="1" />
  <rect x="76" y="58" width="23" height="17" rx="1" />

  <!-- Building 4 -- taller block -->
  <path d="M 108 75 L 108 20 L 138 20 L 138 75" />
  <rect x="113" y="28" width="8" height="8" rx="1" />
  <rect x="125" y="28" width="8" height="8" rx="1" />
  <rect x="116" y="58" width="14" height="17" rx="1" />

  <!-- Building 5 -- small shop -->
  <path d="M 142 75 L 142 40 L 167 40 L 167 75" />
  <rect x="147" y="46" width="14" height="8" rx="1" />
  <rect x="149" y="60" width="12" height="15" rx="1" />

  <!-- Streetcar silhouette in distance -->
  <rect x="172" y="64" width="24" height="11" rx="3" />
  <line x1="180" y1="64" x2="184" y2="55" />
</svg>
