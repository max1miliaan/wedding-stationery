<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 50 160" stroke="currentColor" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <style>:root { color: #1B2438; }</style>
  <!-- Antenna -->
  <line x1="25" y1="2" x2="25" y2="40"/>
  <!-- Shaft upper -->
  <rect x="22" y="40" width="6" height="50"/>
  <!-- Observation deck -->
  <ellipse cx="25" cy="90" rx="16" ry="8"/>
  <!-- Observation deck ring -->
  <ellipse cx="25" cy="95" rx="14" ry="6"/>
  <!-- Shaft lower -->
  <rect x="20" y="95" width="10" height="55"/>
  <!-- Base flare left -->
  <line x1="20" y1="150" x2="14" y2="158"/>
  <!-- Base flare right -->
  <line x1="30" y1="150" x2="36" y2="158"/>
  <!-- Ground -->
  <line x1="10" y1="158" x2="40" y2="158"/>
</svg>
