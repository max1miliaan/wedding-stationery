<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 100" stroke="currentColor" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <style>:root { color: #1B2438; }</style>
  <!-- Building top edge -->
  <rect x="5" y="60" width="150" height="35"/>
  <!-- Railing -->
  <line x1="5" y1="55" x2="155" y2="55"/>
  <!-- Railing posts -->
  <line x1="15" y1="55" x2="15" y2="60"/>
  <line x1="45" y1="55" x2="45" y2="60"/>
  <line x1="75" y1="55" x2="75" y2="60"/>
  <line x1="105" y1="55" x2="105" y2="60"/>
  <line x1="135" y1="55" x2="135" y2="60"/>
  <!-- String lights line -->
  <line x1="15" y1="30" x2="145" y2="30"/>
  <!-- String light poles -->
  <line x1="15" y1="30" x2="15" y2="55"/>
  <line x1="145" y1="30" x2="145" y2="55"/>
  <!-- String light bulbs -->
  <circle cx="30" cy="33" r="2.5"/>
  <circle cx="50" cy="35" r="2.5"/>
  <circle cx="70" cy="36" r="2.5"/>
  <circle cx="90" cy="36" r="2.5"/>
  <circle cx="110" cy="35" r="2.5"/>
  <circle cx="130" cy="33" r="2.5"/>
</svg>
