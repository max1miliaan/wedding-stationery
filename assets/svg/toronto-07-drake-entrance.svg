<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 140" stroke="currentColor" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <style>:root { color: #1B2438; }</style>
  <!-- Building wall -->
  <rect x="10" y="10" width="80" height="125"/>
  <!-- Awning -->
  <rect x="5" y="50" width="90" height="10"/>
  <!-- Awning stripes -->
  <line x1="25" y1="50" x2="25" y2="60"/>
  <line x1="50" y1="50" x2="50" y2="60"/>
  <line x1="75" y1="50" x2="75" y2="60"/>
  <!-- Door frame -->
  <rect x="30" y="65" width="40" height="70"/>
  <!-- Door split -->
  <line x1="50" y1="65" x2="50" y2="135"/>
  <!-- Door handles -->
  <circle cx="46" cy="100" r="2"/>
  <circle cx="54" cy="100" r="2"/>
  <!-- Window above door -->
  <rect x="35" y="20" width="30" height="22"/>
  <!-- Window pane cross -->
  <line x1="50" y1="20" x2="50" y2="42"/>
  <line x1="35" y1="31" x2="65" y2="31"/>
  <!-- Lamp left -->
  <circle cx="22" cy="62" r="4"/>
  <!-- Lamp right -->
  <circle cx="78" cy="62" r="4"/>
</svg>
