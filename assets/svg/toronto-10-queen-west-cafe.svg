  <circle cx="100" cy="75" r="8"/>
  <!-- Table leg -->
  <line x1="100" y1="83" x2="100" y2="90"/>
  <!-- Chair left -->
  <rect x="88" y="78" width="5" height="8"/>
  <!-- Chair right -->
  <rect x="107" y="78" width="5" height="8"/>
