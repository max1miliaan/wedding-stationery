<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 90" stroke="currentColor" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <style>:root { color: #1B2438; }</style>
  <!-- Body -->
  <rect x="10" y="20" width="60" height="50"/>
  <!-- Roof -->
  <polyline points="10,20 15,12 65,12 70,20"/>
  <!-- Destination sign -->
  <rect x="20" y="15" width="40" height="8"/>
  <!-- Windshield -->
  <rect x="18" y="30" width="44" height="22"/>
  <!-- Windshield divider -->
  <line x1="40" y1="30" x2="40" y2="52"/>
  <!-- Headlights -->
  <circle cx="18" cy="60" r="3"/>
  <circle cx="62" cy="60" r="3"/>
  <!-- Bumper -->
  <rect x="12" y="70" width="56" height="5"/>
  <!-- Wheels -->
  <circle cx="22" cy="80" r="4"/>
  <circle cx="58" cy="80" r="4"/>
  <!-- Overhead pole -->
  <line x1="40" y1="12" x2="40" y2="2"/>
  <!-- Ground rail -->
  <line x1="5" y1="84" x2="75" y2="84"/>
</svg>
