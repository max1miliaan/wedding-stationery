<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 100" stroke="currentColor" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <style>:root { color: #1B2438; }</style>
  <!-- Main building -->
  <rect x="10" y="20" width="140" height="75"/>
  <!-- Roofline -->
  <line x1="10" y1="20" x2="150" y2="20"/>
  <!-- Arched window 1 - rect + polyline arch -->
  <rect x="20" y="40" width="20" height="30"/>
  <polyline points="20,40 25,32 30,28 35,32 40,40"/>
  <!-- Arched window 2 -->
  <rect x="50" y="40" width="20" height="30"/>
  <polyline points="50,40 55,32 60,28 65,32 70,40"/>
  <!-- Arched window 3 -->
  <rect x="80" y="40" width="20" height="30"/>
  <polyline points="80,40 85,32 90,28 95,32 100,40"/>
  <!-- Large arched door -->
  <rect x="110" y="45" width="28" height="50"/>
  <polyline points="110,45 117,35 124,30 131,35 138,45"/>
  <!-- Brick detail lines -->
  <line x1="10" y1="30" x2="150" y2="30"/>
  <line x1="10" y1="80" x2="100" y2="80"/>
  <!-- Ground -->
  <line x1="2" y1="95" x2="158" y2="95"/>
  <!-- Chimney -->
  <rect x="130" y="8" width="10" height="12"/>
</svg>
