<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 100" stroke="currentColor" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <style>:root { color: #1B2438; }</style>
  <!-- Umbrella -->
  <polygon points="60,15 40,35 80,35"/>
  <line x1="60" y1="35" x2="60" y2="70"/>
  <!-- Table 1 under umbrella -->
  <rect x="48" y="65" width="24" height="4"/>
  <!-- Table 1 leg -->
  <line x1="60" y1="69" x2="60" y2="80"/>
  <!-- Chair 1 left -->
  <rect x="40" y="62" width="6" height="10"/>
  <!-- Chair 1 right -->
  <rect x="74" y="62" width="6" height="10"/>
  <!-- Table 2 -->
  <rect x="110" y="65" width="24" height="4"/>
  <line x1="122" y1="69" x2="122" y2="80"/>
  <!-- Chair 2 left -->
  <rect x="102" y="62" width="6" height="10"/>
  <!-- Chair 2 right -->
  <rect x="136" y="62" width="6" height="10"/>
  <!-- String lights -->
  <line x1="5" y1="10" x2="155" y2="10"/>
  <!-- String light poles -->
  <line x1="5" y1="10" x2="5" y2="90"/>
  <line x1="155" y1="10" x2="155" y2="90"/>
  <!-- Bulbs -->
  <circle cx="25" cy="13" r="2"/>
  <circle cx="50" cy="14" r="2"/>
  <circle cx="80" cy="14.5" r="2"/>
  <circle cx="110" cy="14" r="2"/>
  <circle cx="135" cy="13" r="2"/>
  <!-- Ground -->
  <line x1="0" y1="90" x2="160" y2="90"/>
</svg>
