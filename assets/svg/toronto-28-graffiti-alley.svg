<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 120" stroke="currentColor" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <style>:root { color: #1B2438; }</style>
  <!-- Left wall -->
  <polygon points="5,20 35,10 35,115 5,115"/>
  <!-- Right wall -->
  <polygon points="95,20 65,10 65,115 95,115"/>
  <!-- Ground perspective -->
  <polygon points="35,115 65,115 65,10 35,10"/>
  <!-- Left wall art block 1 -->
  <rect x="10" y="35" width="18" height="12"/>
  <!-- Left wall art block 2 -->
  <rect x="12" y="55" width="14" height="10"/>
  <!-- Left wall art block 3 -->
  <rect x="8" y="75" width="20" height="15"/>
  <!-- Right wall art block 1 -->
  <rect x="72" y="30" width="16" height="14"/>
  <!-- Right wall art block 2 -->
  <rect x="70" y="52" width="18" height="10"/>
  <!-- Right wall art block 3 -->
  <rect x="74" y="70" width="14" height="18"/>
  <!-- Center ground line -->
  <line x1="50" y1="10" x2="50" y2="115"/>
  <!-- Left wall top ledge -->
  <line x1="5" y1="20" x2="35" y2="10"/>
  <!-- Right wall top ledge -->
  <line x1="95" y1="20" x2="65" y2="10"/>
  <!-- Ground line -->
  <line x1="2" y1="118" x2="98" y2="118"/>
  <!-- Small circle art left -->
  <circle cx="20" cy="98" r="4"/>
  <!-- Small circle art right -->
  <circle cx="80" cy="95" r="5"/>
</svg>
