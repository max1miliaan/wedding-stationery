<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 100" stroke="currentColor" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <style>:root { color: #1B2438; }</style>
  <!-- Main building body -->
  <rect x="10" y="30" width="100" height="62"/>
  <!-- Roof -->
  <polygon points="5,30 60,8 115,30"/>
  <!-- Arched entrance left curve -->
  <ellipse cx="60" cy="72" rx="18" ry="20"/>
  <!-- Door bottom left -->
  <line x1="42" y1="72" x2="42" y2="92"/>
  <!-- Door bottom right -->
  <line x1="78" y1="72" x2="78" y2="92"/>
  <!-- Window left -->
  <rect x="18" y="42" width="12" height="16"/>
  <!-- Window right -->
  <rect x="90" y="42" width="12" height="16"/>
  <!-- Window left upper pane -->
  <line x1="24" y1="42" x2="24" y2="58"/>
  <!-- Window right upper pane -->
  <line x1="96" y1="42" x2="96" y2="58"/>
  <!-- Clock circle -->
  <circle cx="60" cy="22" r="6"/>
  <!-- Clock hand -->
  <line x1="60" y1="22" x2="60" y2="18"/>
  <!-- Clock hand 2 -->
  <line x1="60" y1="22" x2="63" y2="24"/>
  <!-- Cornice line -->
  <line x1="10" y1="38" x2="110" y2="38"/>
  <!-- Ground -->
  <line x1="5" y1="92" x2="115" y2="92"/>
  <!-- Small step -->
  <rect x="38" y="88" width="44" height="4"/>
</svg>
