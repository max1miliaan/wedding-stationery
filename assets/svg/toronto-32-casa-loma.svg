<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 130 110" stroke="currentColor" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <style>:root { color: #1B2438; }</style>
  <!-- Main castle body -->
  <rect x="25" y="45" width="80" height="55"/>
  <!-- Left turret -->
  <rect x="10" y="25" width="20" height="75"/>
  <!-- Left turret top -->
  <polygon points="10,25 20,10 30,25"/>
  <!-- Right turret -->
  <rect x="100" y="25" width="20" height="75"/>
  <!-- Right turret top -->
  <polygon points="100,25 110,10 120,25"/>
  <!-- Central tower -->
  <rect x="55" y="20" width="20" height="25"/>
  <!-- Central tower battlement left -->
  <rect x="55" y="15" width="6" height="5"/>
  <!-- Central tower battlement right -->
  <rect x="69" y="15" width="6" height="5"/>
  <!-- Gate arch -->
  <ellipse cx="65" cy="85" rx="10" ry="15"/>
  <!-- Gate bottom -->
  <line x1="55" y1="100" x2="75" y2="100"/>
  <!-- Window left turret -->
  <rect x="16" y="40" width="8" height="10"/>
  <!-- Window right turret -->
  <rect x="106" y="40" width="8" height="10"/>
  <!-- Window left wall -->
  <rect x="35" y="55" width="8" height="10"/>
  <!-- Window right wall -->
  <rect x="85" y="55" width="8" height="10"/>
  <!-- Ground -->
  <line x1="5" y1="100" x2="125" y2="100"/>
  <!-- Steps -->
  <rect x="52" y="96" width="26" height="4"/>
</svg>
