<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 150 80" stroke="currentColor" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <style>:root { color: #1B2438; }</style>
  <!-- Waterfront promenade -->
  <line x1="2" y1="50" x2="148" y2="50"/>
  <!-- Railing -->
  <line x1="2" y1="46" x2="148" y2="46"/>
  <!-- Railing post 1 -->
  <line x1="20" y1="46" x2="20" y2="50"/>
  <!-- Railing post 2 -->
  <line x1="50" y1="46" x2="50" y2="50"/>
  <!-- Railing post 3 -->
  <line x1="80" y1="46" x2="80" y2="50"/>
  <!-- Railing post 4 -->
  <line x1="110" y1="46" x2="110" y2="50"/>
  <!-- Sailboat 1 hull -->
  <polygon points="25,62 45,62 40,68 30,68"/>
  <!-- Sailboat 1 mast -->
  <line x1="35" y1="52" x2="35" y2="62"/>
  <!-- Sailboat 1 sail -->
  <polygon points="35,52 35,60 44,60"/>
  <!-- Sailboat 2 hull -->
  <polygon points="90,60 108,60 104,66 94,66"/>
  <!-- Sailboat 2 mast -->
  <line x1="99" y1="50" x2="99" y2="60"/>
  <!-- Sailboat 2 sail -->
  <polygon points="99,50 99,58 108,58"/>
  <!-- Water wave 1 -->
  <polyline points="5,72 15,68 25,72 35,68 45,72"/>
  <!-- Water wave 2 -->
  <polyline points="65,70 75,66 85,70 95,66 105,70 115,66 125,70"/>
  <!-- Horizon line -->
  <line x1="2" y1="55" x2="148" y2="55"/>
</svg>
