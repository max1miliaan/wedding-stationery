<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 140 100" stroke="currentColor" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <style>:root { color: #1B2438; }</style>
  <!-- City Hall left tower -->
  <rect x="30" y="10" width="15" height="55"/>
  <!-- City Hall right tower -->
  <rect x="95" y="15" width="12" height="50"/>
  <!-- City Hall curved connecting arch -->
  <ellipse cx="70" cy="45" rx="32" ry="18"/>
  <!-- Arch base left -->
  <line x1="38" y1="45" x2="38" y2="65"/>
  <!-- Arch base right -->
  <line x1="102" y1="45" x2="102" y2="65"/>
  <!-- Podium / base -->
  <rect x="25" y="65" width="90" height="10"/>
  <!-- Reflecting pool -->
  <rect x="20" y="80" width="100" height="10"/>
  <!-- Pool water line 1 -->
  <line x1="30" y1="85" x2="50" y2="85"/>
  <!-- Pool water line 2 -->
  <line x1="60" y1="85" x2="80" y2="85"/>
  <!-- Pool water line 3 -->
  <line x1="90" y1="85" x2="110" y2="85"/>
  <!-- Left tower window -->
  <rect x="34" y="20" width="7" height="10"/>
  <!-- Right tower window -->
  <rect x="98" y="25" width="6" height="10"/>
  <!-- Steps -->
  <line x1="20" y1="75" x2="120" y2="75"/>
  <!-- Ground -->
  <line x1="10" y1="92" x2="130" y2="92"/>
  <!-- Plaza detail -->
  <line x1="15" y1="95" x2="125" y2="95"/>
</svg>
