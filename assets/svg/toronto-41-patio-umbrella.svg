<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 110 100" stroke="currentColor" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <style>:root { color: #1B2438; }</style>
  <!-- Umbrella canopy -->
  <ellipse cx="55" cy="20" rx="35" ry="12"/>
  <!-- Umbrella pole -->
  <line x1="55" y1="20" x2="55" y2="65"/>
  <!-- Table top -->
  <rect x="30" y="62" width="50" height="4"/>
  <!-- Table leg left -->
  <line x1="38" y1="66" x2="35" y2="90"/>
  <!-- Table leg right -->
  <line x1="72" y1="66" x2="75" y2="90"/>
  <!-- Chair left seat -->
  <line x1="10" y1="70" x2="28" y2="70"/>
  <!-- Chair left back -->
  <line x1="10" y1="55" x2="10" y2="70"/>
  <!-- Chair left front leg -->
  <line x1="25" y1="70" x2="25" y2="90"/>
  <!-- Chair left back leg -->
  <line x1="10" y1="70" x2="10" y2="90"/>
  <!-- Chair right seat -->
  <line x1="82" y1="70" x2="100" y2="70"/>
  <!-- Chair right back -->
  <line x1="100" y1="55" x2="100" y2="70"/>
  <!-- Chair right front leg -->
  <line x1="85" y1="70" x2="85" y2="90"/>
  <!-- Chair right back leg -->
  <line x1="100" y1="70" x2="100" y2="90"/>
  <!-- Umbrella tip -->
  <line x1="55" y1="8" x2="55" y2="10"/>
  <!-- Ground -->
  <line x1="5" y1="92" x2="105" y2="92"/>
</svg>
