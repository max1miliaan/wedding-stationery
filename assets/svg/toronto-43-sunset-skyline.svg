  <rect x="122" y="48" width="16" height="32"/>
  <!-- Horizon / ground line -->
  <line x1="2" y1="80" x2="148" y2="80"/>
  <!-- Water reflection line 1 -->
  <line x1="20" y1="84" x2="50" y2="84"/>
  <!-- Water reflection line 2 -->
  <line x1="65" y1="84" x2="95" y2="84"/>
  <!-- Water reflection line 3 -->
