<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 150 90" stroke="currentColor" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <style>:root { color: #1B2438; }</style>
  <!-- Sun large circle -->
  <circle cx="75" cy="35" r="18"/>
  <!-- Building 1 -->
  <rect x="10" y="50" width="14" height="30"/>
  <!-- Building 2 -->
