<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 100" stroke="currentColor" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <style>:root { color: #1B2438; }</style>
  <!-- Building facade -->
  <rect x="55" y="10" width="60" height="80"/>
  <!-- Building window 1 -->
  <rect x="62" y="20" width="10" height="12"/>
  <!-- Building window 2 -->
  <rect x="80" y="20" width="10" height="12"/>
  <!-- Building door -->
  <rect x="72" y="68" width="14" height="22"/>
  <!-- Awning -->
  <polygon points="58,60 112,60 108,52 62,52"/>
  <!-- Cafe table top -->
  <ellipse cx="30" cy="68" rx="14" ry="5"/>
  <!-- Table leg -->
  <line x1="30" y1="73" x2="30" y2="88"/>
  <!-- Wine bottle -->
  <rect x="26" y="56" width="5" height="12"/>
  <!-- Bottle neck -->
  <line x1="28" y1="52" x2="28" y2="56"/>
  <!-- Wine glass stem -->
  <line x1="36" y1="68" x2="36" y2="60"/>
  <!-- Wine glass bowl -->
  <ellipse cx="36" cy="58" rx="4" ry="3"/>
  <!-- Chair left -->
  <rect x="14" y="74" width="8" height="3"/>
  <!-- Chair left back -->
  <line x1="14" y1="65" x2="14" y2="77"/>
  <!-- Chair left legs -->
  <line x1="14" y1="77" x2="14" y2="88"/>
  <!-- Chair right -->
  <rect x="40" y="74" width="8" height="3"/>
  <!-- Chair right legs -->
  <line x1="46" y1="77" x2="46" y2="88"/>
  <!-- Ground -->
  <line x1="5" y1="90" x2="118" y2="90"/>
</svg>
