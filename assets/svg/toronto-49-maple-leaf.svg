<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 110" stroke="currentColor" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <style>:root { color: #1B2438; }</style>
  <!-- Maple leaf shape (polygon approximation) -->
  <polygon points="50,5 55,20 70,15 60,30 75,30 62,40 80,50 60,48 55,65 50,55 45,65 40,48 20,50 38,40 25,30 40,30 30,15 45,20"/>
  <!-- Stem -->
  <line x1="50" y1="65" x2="50" y2="90"/>
  <!-- Stem curve detail -->
  <line x1="50" y1="80" x2="46" y2="85"/>
  <!-- Center vein -->
  <line x1="50" y1="15" x2="50" y2="55"/>
  <!-- Left vein upper -->
  <line x1="50" y1="25" x2="38" y2="18"/>
  <!-- Right vein upper -->
  <line x1="50" y1="25" x2="62" y2="18"/>
  <!-- Left vein mid -->
  <line x1="50" y1="35" x2="32" y2="32"/>
  <!-- Right vein mid -->
  <line x1="50" y1="35" x2="68" y2="32"/>
  <!-- Left vein lower -->
  <line x1="50" y1="45" x2="28" y2="48"/>
  <!-- Right vein lower -->
  <line x1="50" y1="45" x2="72" y2="48"/>
</svg>
