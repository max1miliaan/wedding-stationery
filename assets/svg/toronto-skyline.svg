<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 80" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <style>:root { color: #1B2438; }</style>
  <!-- Far left buildings -->
  <rect x="5" y="40" width="12" height="40" />
  <rect x="20" y="30" width="10" height="50" />
  <rect x="33" y="35" width="14" height="45" />

  <!-- Mid-left buildings -->
  <rect x="50" y="25" width="11" height="55" />
  <rect x="64" y="32" width="15" height="48" />

  <!-- Rogers Centre dome -->
  <path d="M 82 80 L 82 60 Q 95 45 108 60 L 108 80" />

  <!-- CN Tower (prominent, slightly left of center) -->
  <line x1="118" y1="80" x2="117" y2="30" />
  <line x1="122" y1="80" x2="123" y2="30" />
  <!-- Observation pod -->
  <path d="M 112 35 Q 112 28 120 26 Q 128 28 128 35" />
  <path d="M 112 35 Q 112 40 120 42 Q 128 40 128 35" />
  <line x1="112" y1="37" x2="128" y2="37" />
  <!-- Upper shaft -->
  <line x1="118" y1="26" x2="119" y2="12" />
  <line x1="122" y1="26" x2="121" y2="12" />
  <!-- Antenna -->
  <line x1="120" y1="12" x2="120" y2="2" />

  <!-- Buildings right of CN Tower -->
  <rect x="135" y="28" width="13" height="52" />
  <rect x="151" y="22" width="11" height="58" />
  <rect x="165" y="30" width="16" height="50" />

  <!-- Taller cluster (financial district) -->
  <rect x="184" y="18" width="12" height="62" />
  <rect x="199" y="24" width="10" height="56" />
  <rect x="212" y="15" width="14" height="65" />
  <rect x="229" y="26" width="11" height="54" />

  <!-- Far right buildings -->
  <rect x="243" y="35" width="13" height="45" />
  <rect x="259" y="30" width="10" height="50" />
  <rect x="272" y="38" width="14" height="42" />
  <rect x="289" y="42" width="8" height="38" />

  <!-- Ground line -->
  <line x1="0" y1="80" x2="300" y2="80" />
</svg>
