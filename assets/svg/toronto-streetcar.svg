<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 70" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <style>:root { color: #1B2438; }</style>

  <!-- Main body -->
  <path d="M 15 28 L 15 55 Q 15 60 20 60 L 140 60 Q 145 60 145 55 L 145 28 Q 145 22 138 22 L 22 22 Q 15 22 15 28" />

