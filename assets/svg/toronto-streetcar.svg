  <rect x="94" y="36" width="10" height="12" rx="1" />
  <rect x="108" y="36" width="10" height="12" rx="1" />
  <!-- Rear door -->
  <rect x="122" y="33" width="12" height="27" rx="1" />
  <line x1="128" y1="33" x2="128" y2="60" />

