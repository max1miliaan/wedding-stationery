<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Details Card -- Kash &amp; Max</title>
  <link rel="stylesheet" href="../css/design-system.css">
  <link rel="stylesheet" href="../css/print.css">
  <style>
    @page {
      size: 4.625in 6in;
      margin: 0;
    }

    .card {
      width: 4.625in;
      height: 6in;
      display: flex;
      flex-direction: column;
      position: relative;
      background: var(--cream);
    }

    .card-inner {
      position: relative;
      z-index: 1;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      padding: 0.45in 0.45in 0.2in;
    }

    /* Header */
    .header {
      text-align: center;
      margin-bottom: 0.15in;
    }

    .header-title {
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 22pt;
      color: var(--navy);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .header-rule {
      width: 1.5in;
      height: 1px;
      background: var(--coral);
      margin: 0.08in auto 0;
    }

    /* Sections */
    .section {
      margin-bottom: 0.2in;
    }

    .section-header {
      display: flex;
      align-items: center;
      gap: 0.1in;
      margin-bottom: 0.05in;
    }

    .section-icon {
      width: 0.22in;
      height: 0.22in;
      color: var(--coral);
      flex-shrink: 0;
    }

    .section-icon svg {
      width: 100%;
      height: 100%;
    }

    .section-title {
      font-family: var(--font-display);
      font-weight: 600;
      font-size: 10pt;
      text-transform: uppercase;
      color: var(--coral);
      letter-spacing: 0.05em;
    }

    .section-body {
      font-family: var(--font-body);
      font-size: 10pt;
      font-weight: 400;
      color: var(--navy);
      line-height: 1.5;
      padding-left: 0.32in;
    }

    .section-address {
      font-family: var(--font-utility);
      font-size: 9pt;
      font-weight: 400;
      color: var(--navy-light);
      line-height: 1.4;
      padding-left: 0.32in;
      margin-top: 0.03in;
    }

    /* Moose peeking from bottom */
    .moose-peeking {
      position: absolute;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 1.4in;
      height: 0.8in;
      color: var(--navy);
    }

    .moose-peeking svg {
      width: 100%;
      height: 100%;
    }
  </style>
</head>
<body>
  <div class="card page-details">
    <div class="card-inner">
      <!-- Header -->
      <div class="header">
        <div class="header-title">The Details</div>
        <div class="header-rule"></div>
      </div>

      <!-- Cocktails & Celebration -->
      <div class="section">
        <div class="section-header">
          <div class="section-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <path d="M 5 12 Q 5 6 12 4 Q 19 6 19 12" />
              <ellipse cx="12" cy="12" rx="7" ry="3" />
              <line x1="12" y1="15" x2="12" y2="21" />
              <ellipse cx="12" cy="22" rx="5" ry="1.5" />
            </svg>
          </div>
          <div class="section-title">Cocktails & Celebration</div>
        </div>
        <div class="section-body">
          Join us on the rooftop for cocktails,<br>
          food stations, and dancing under the stars.
        </div>
      </div>

      <!-- Dress Code -->
      <div class="section">
        <div class="section-header">
          <div class="section-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <path d="M 8 3 L 8 8 Q 8 12 12 14 Q 16 12 16 8 L 16 3" />
              <path d="M 8 3 Q 12 5 16 3" />
              <line x1="12" y1="14" x2="12" y2="22" />
              <path d="M 8 22 L 16 22" />
            </svg>
          </div>
          <div class="section-title">Dress Code</div>
        </div>
        <div class="section-body">
          Cocktail attire
        </div>
      </div>

      <!-- Accommodations -->
      <div class="section">
        <div class="section-header">
          <div class="section-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="8" width="18" height="14" rx="1" />
              <path d="M 3 14 L 21 14" />
              <path d="M 10 8 L 10 2 L 14 2 L 14 8" />
              <path d="M 8 14 L 8 18" />
              <path d="M 16 14 L 16 18" />
            </svg>
          </div>
          <div class="section-title">Accommodations</div>
        </div>
        <div class="section-body">
          We have reserved a room block at<br>
          The Drake Hotel. Details on our website.
        </div>
      </div>

      <!-- Getting There -->
      <div class="section">
        <div class="section-header">
          <div class="section-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <path d="M 12 2 Q 18 2 18 10 Q 18 16 12 22 Q 6 16 6 10 Q 6 2 12 2" />
              <circle cx="12" cy="10" r="3" />
            </svg>
          </div>
          <div class="section-title">Getting There</div>
        </div>
        <div class="section-body">
          The Drake Hotel
        </div>
        <div class="section-address">
          1150 Queen Street West<br>
          Toronto, ON
        </div>
      </div>
    </div>

    <!-- Moose peeking from bottom edge -->
    <div class="moose-peeking">
      <svg viewBox="0 0 160 80" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <!-- Edge lines -->
        <line x1="0" y1="42" x2="35" y2="42" />
        <line x1="125" y1="42" x2="160" y2="42" />
        <!-- Head top -->
        <path d="M 42 42 C 40 25, 50 12, 65 10 C 72 9, 88 9, 95 10 C 110 12, 120 25, 118 42" />
        <!-- Forehead wrinkles -->
        <path d="M 58 18 C 64 15, 72 15, 78 18" />
        <path d="M 82 18 C 88 15, 94 16, 98 19" />
        <path d="M 62 23 C 70 20, 86 20, 94 23" />
        <!-- Rose ears -->
        <path d="M 46 22 C 40 14, 34 12, 32 18 C 31 22, 35 26, 40 26" />
        <path d="M 114 22 C 120 14, 126 12, 128 18 C 129 22, 125 26, 120 26" />
        <!-- Eyes (curious, looking up) -->
        <circle cx="62" cy="32" r="5" fill="currentColor" />
        <circle cx="98" cy="32" r="5" fill="currentColor" />
        <circle cx="60" cy="30" r="2" fill="white" stroke="none" />
        <circle cx="96" cy="30" r="2" fill="white" stroke="none" />
        <!-- Nose -->
        <path d="M 72 40 C 72 37, 75 35, 80 35 C 85 35, 88 37, 88 40" />
        <ellipse cx="76" cy="39" rx="2" ry="1.5" />
        <ellipse cx="84" cy="39" rx="2" ry="1.5" />
        <!-- Front paws gripping edge -->
        <path d="M 40 42 C 40 48, 38 55, 38 60 C 38 64, 42 66, 46 65 C 50 64, 54 62, 55 58 C 56 54, 55 48, 55 42" />
        <path d="M 105 42 C 105 48, 103 55, 103 60 C 103 64, 107 66, 111 65 C 115 64, 119 62, 120 58 C 121 54, 120 48, 120 42" />
        <!-- Toe lines -->
        <path d="M 43 62 L 43 56" />
        <path d="M 47 63 L 47 57" />
        <path d="M 51 62 L 51 56" />
        <path d="M 108 62 L 108 56" />
        <path d="M 112 63 L 112 57" />
        <path d="M 116 62 L 116 56" />
      </svg>
    </div>
  </div>
</body>
</html>
