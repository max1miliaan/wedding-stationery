<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Details Card -- Kash &amp; Max</title>
  <link rel="stylesheet" href="../css/design-system.css">
  <link rel="stylesheet" href="../css/print.css">
  <style>
    @page {
      size: 4.625in 6in;
      margin: 0;
    }

    .card {
      width: 4.625in;
      height: 6in;
      display: flex;
      flex-direction: column;
      position: relative;
      background: var(--cream);
    }

    .card-inner {
      position: relative;
      z-index: 1;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      padding: 0.45in 0.45in 0.2in;
    }

    /* Header */
    .header {
      text-align: center;
      margin-bottom: 0.15in;
    }

    .header-title {
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 22pt;
      color: var(--navy);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .header-rule {
      width: 1.5in;
      height: 1px;
      background: var(--coral);
      margin: 0.08in auto 0;
    }

    /* Sections */
    .section {
      margin-bottom: 0.2in;
    }

    .section-header {
      display: flex;
      align-items: center;
      gap: 0.1in;
      margin-bottom: 0.05in;
    }

    .section-icon {
      width: 0.22in;
      height: 0.22in;
      color: var(--coral);
      flex-shrink: 0;
    }

    .section-icon svg {
      width: 100%;
      height: 100%;
    }

    .section-title {
      font-family: var(--font-display);
      font-weight: 600;
      font-size: 10pt;
      text-transform: uppercase;
      color: var(--coral);
      letter-spacing: 0.05em;
    }

    .section-body {
      font-family: var(--font-body);
      font-size: 10pt;
      font-weight: 400;
      color: var(--navy);
      line-height: 1.5;
      padding-left: 0.32in;
    }

    .section-address {
      font-family: var(--font-utility);
      font-size: 9pt;
      font-weight: 400;
      color: var(--navy-light);
      line-height: 1.4;
      padding-left: 0.32in;
      margin-top: 0.03in;
    }

    /* Moose peeking from bottom */
    .moose-peeking {
      position: absolute;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 1.4in;
      height: 0.8in;
      color: var(--navy);
    }

    .moose-peeking svg {
      width: 100%;
      height: 100%;
    }
  </style>
</head>
<body>
  <div class="card page-details">
    <div class="card-inner">
      <!-- Header -->
      <div class="header">
        <div class="header-title">The Details</div>
        <div class="header-rule"></div>
      </div>

      <!-- Cocktails & Celebration -->
      <div class="section">
        <div class="section-header">
          <div class="section-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <path d="M 5 12 Q 5 6 12 4 Q 19 6 19 12" />
              <ellipse cx="12" cy="12" rx="7" ry="3" />
              <line x1="12" y1="15" x2="12" y2="21" />
              <ellipse cx="12" cy="22" rx="5" ry="1.5" />
            </svg>
          </div>
          <div class="section-title">Cocktails & Celebration</div>
        </div>
        <div class="section-body">
          Join us on the rooftop for cocktails,<br>
          food stations, and dancing under the stars.
        </div>
      </div>

      <!-- Dress Code -->
      <div class="section">
        <div class="section-header">
          <div class="section-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <path d="M 8 3 L 8 8 Q 8 12 12 14 Q 16 12 16 8 L 16 3" />
              <path d="M 8 3 Q 12 5 16 3" />
              <line x1="12" y1="14" x2="12" y2="22" />
              <path d="M 8 22 L 16 22" />
            </svg>
          </div>
          <div class="section-title">Dress Code</div>
        </div>
        <div class="section-body">
          Cocktail attire
        </div>
      </div>

      <!-- Accommodations -->
      <div class="section">
        <div class="section-header">
          <div class="section-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="8" width="18" height="14" rx="1" />
              <path d="M 3 14 L 21 14" />
              <path d="M 10 8 L 10 2 L 14 2 L 14 8" />
              <path d="M 8 14 L 8 18" />
              <path d="M 16 14 L 16 18" />
            </svg>
          </div>
          <div class="section-title">Accommodations</div>
        </div>
        <div class="section-body">
          We have reserved a room block at<br>
          The Drake Hotel. Details on our website.
        </div>
      </div>

      <!-- Getting There -->
      <div class="section">
        <div class="section-header">
          <div class="section-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <path d="M 12 2 Q 18 2 18 10 Q 18 16 12 22 Q 6 16 6 10 Q 6 2 12 2" />
              <circle cx="12" cy="10" r="3" />
            </svg>
          </div>
          <div class="section-title">Getting There</div>
        </div>
        <div class="section-body">
          The Drake Hotel
        </div>
        <div class="section-address">
          1150 Queen Street West<br>
          Toronto, ON
        </div>
      </div>
    </div>

    <!-- Moose peeking from bottom edge -->
    <div class="moose-peeking">
      <svg viewBox="0 0 140 70" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <!-- English bulldog peeking over edge -->
        <!-- Edge line -->
        <line x1="0" y1="35" x2="30" y2="35" />
        <line x1="110" y1="35" x2="140" y2="35" />
        <!-- Head top (above edge) -->
        <ellipse cx="70" cy="22" rx="28" ry="20" />
        <!-- Wrinkle lines -->
        <path d="M 54 12 Q 62 9 70 12" />
        <path d="M 70 12 Q 78 9 86 12" />
        <!-- Rose ears -->
        <path d="M 44 14 Q 38 7 35 14 Q 37 19 42 18" />
        <path d="M 96 14 Q 102 7 105 14 Q 103 19 98 18" />
        <!-- Eyes (wide, curious, looking up) -->
        <circle cx="56" cy="22" r="3.5" fill="currentColor" />
        <circle cx="84" cy="22" r="3.5" fill="currentColor" />
        <!-- Nose (wide, flat) -->
        <ellipse cx="70" cy="32" rx="7" ry="4" />
        <circle cx="66" cy="32" r="1.5" />
        <circle cx="74" cy="32" r="1.5" />
        <!-- Front paws gripping edge -->
        <path d="M 38 35 L 38 45 Q 42 50 48 48 Q 52 46 52 35" />
        <path d="M 88 35 L 88 45 Q 92 50 98 48 Q 102 46 102 35" />
        <!-- Paw toes -->
        <path d="M 42 47 L 42 44" />
        <path d="M 46 47 L 46 44" />
        <path d="M 92 47 L 92 44" />
        <path d="M 96 47 L 96 44" />
      </svg>
    </div>
  </div>
</body>
</html>
