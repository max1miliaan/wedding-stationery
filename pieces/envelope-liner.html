<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Envelope Liner -- Kash &amp; Max</title>
  <link rel="stylesheet" href="../css/design-system.css">
  <link rel="stylesheet" href="../css/print.css">
  <style>
    @page {
      size: 5.5in 7.5in;
      margin: 0;
    }

    .liner {
      width: 5.5in;
      height: 7.5in;
      position: relative;
      background: linear-gradient(135deg, var(--coral-light) 0%, var(--coral) 50%, var(--pink) 100%);
      overflow: hidden;
    }

    /* Scattered doodle pattern in cream */
    .doodle-pattern {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      color: var(--cream);
      opacity: 0.35;
    }

    .doodle-pattern svg {
      width: 100%;
      height: 100%;
    }
  </style>
</head>
<body>
  <div class="liner page-envelope-liner">
    <div class="doodle-pattern">
      <svg viewBox="0 0 550 750" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <!-- Row 1 -->
        <!-- Champagne glasses -->
        <g transform="translate(40, 40) scale(0.35)">
          <path d="M 25 90 Q 25 60 35 45 Q 38 40 40 35 L 42 20 Q 43 12 50 10 Q 55 9 58 12" />
          <path d="M 95 90 Q 95 60 85 45 Q 82 40 80 35 L 78 20 Q 77 12 70 10 Q 65 9 62 12" />
          <ellipse cx="42" cy="45" rx="16" ry="8" />
          <ellipse cx="78" cy="45" rx="16" ry="8" />
        </g>
        <!-- Star -->
        <g transform="translate(180, 55)">
          <path d="M 0 -10 L 3 -3 L 10 -3 L 5 2 L 7 10 L 0 6 L -7 10 L -5 2 L -10 -3 L -3 -3 Z" />
        </g>
        <!-- Heart -->
        <g transform="translate(300, 45)">
          <path d="M 0 12 Q -14 -2 -14 -8 Q -14 -14 -7 -14 Q -2 -14 0 -8 Q 2 -14 7 -14 Q 14 -14 14 -8 Q 14 -2 0 12" />
        </g>
        <!-- CN Tower small -->
        <g transform="translate(430, 20) scale(0.3)">
          <line x1="0" y1="100" x2="-2" y2="30" />
          <line x1="4" y1="100" x2="6" y2="30" />
          <path d="M -8 35 Q -8 28 2 26 Q 12 28 12 35" />
          <path d="M -8 35 Q -8 40 2 42 Q 12 40 12 35" />
          <line x1="2" y1="26" x2="2" y2="5" />
        </g>

        <!-- Row 2 -->
        <g transform="translate(80, 160)">
          <path d="M 0 12 Q -12 -2 -12 -7 Q -12 -12 -6 -12 Q -2 -12 0 -7 Q 2 -12 6 -12 Q 12 -12 12 -7 Q 12 -2 0 12" />
        </g>
        <!-- Moose silhouette small -->
        <g transform="translate(210, 140) scale(0.22)">
          <ellipse cx="60" cy="30" rx="24" ry="18" />
          <path d="M 38 20 Q 32 14 30 20 Q 32 24 36 24" />
          <path d="M 82 20 Q 88 14 90 20 Q 88 24 84 24" />
          <circle cx="48" cy="28" r="2.5" fill="currentColor" />
          <circle cx="72" cy="28" r="2.5" fill="currentColor" />
          <path d="M 38 46 Q 32 54 30 68" />
          <path d="M 82 46 Q 88 54 90 68" />
          <path d="M 30 68 Q 60 78 90 68" />

        <g transform="translate(380, 155)">

          <path d="M 0 -6 L 2 -1 L 6 -1 L 3 1 L 4 6 L 0 4 L -4 6 L -3 1 L -6 -1 L -2 -1 Z" />

        <!-- Row 3 -->

          <path d="M 0 10 Q -10 -2 -10 -6 Q -10 -10 -5 -10 Q -2 -10 0 -6 Q 2 -10 5 -10 Q 10 -10 10 -6 Q 10 -2 0 10" />
        </g>
        <g transform="translate(470, 260) scale(0.25)">

          <path d="M 0 12 Q -14 -2 -14 -8 Q -14 -14 -7 -14 Q -2 -14 0 -8 Q 2 -14 7 -14 Q 14 -14 14 -8 Q 14 -2 0 12" />
        </g>

        <!-- Row 5 -->
        <g transform="translate(60, 510)">
          <path d="M 0 -8 L 2 -2 L 8 -2 L 4 2 L 6 8 L 0 5 L -6 8 L -4 2 L -8 -2 L -2 -2 Z" />
        </g>
        <g transform="translate(200, 500) scale(0.3)">
          <path d="M 25 90 Q 25 60 35 45 Q 38 40 40 35 L 42 20 Q 43 12 50 10 Q 55 9 58 12" />
          <path d="M 95 90 Q 95 60 85 45 Q 82 40 80 35 L 78 20 Q 77 12 70 10 Q 65 9 62 12" />
          <ellipse cx="42" cy="45" rx="16" ry="8" />
          <ellipse cx="78" cy="45" rx="16" ry="8" />
        </g>
        <g transform="translate(370, 510)">
          <path d="M 0 10 Q -10 -2 -10 -6 Q -10 -10 -5 -10 Q -2 -10 0 -6 Q 2 -10 5 -10 Q 10 -10 10 -6 Q 10 -2 0 10" />
        </g>
        <g transform="translate(490, 500)">
          <path d="M 0 -6 L 2 -1 L 6 -1 L 3 1 L 4 6 L 0 4 L -4 6 L -3 1 L -6 -1 L -2 -1 Z" />

        <!-- Row 6 -->
        <g transform="translate(120, 620)">
          <path d="M 0 10 Q -12 -2 -12 -7 Q -12 -12 -6 -12 Q -2 -12 0 -7 Q 2 -12 6 -12 Q 12 -12 12 -7 Q 12 -2 0 10" />

          <path d="M 30 68 Q 60 78 90 68" />
        </g>
        <g transform="translate(430, 620) scale(0.28)">
          <line x1="0" y1="100" x2="-2" y2="30" />
          <line x1="4" y1="100" x2="6" y2="30" />
          <path d="M -8 35 Q -8 28 2 26 Q 12 28 12 35" />
          <path d="M -8 35 Q -8 40 2 42 Q 12 40 12 35" />
          <line x1="2" y1="26" x2="2" y2="5" />
        </g>
      </svg>
    </div>
  </div>
</body>
</html>
