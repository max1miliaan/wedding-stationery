<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wedding Program -- Kash &amp; Max</title>
  <link rel="stylesheet" href="../css/design-system.css">
  <link rel="stylesheet" href="../css/print.css">
  <style>
    @page {
      size: 4.5in 5.75in;
      margin: 0;
    }

    .card {
      width: 4.5in;
      height: 5.75in;
      display: flex;
      flex-direction: column;
      position: relative;
      background: var(--cream);
    }

    .card-inner {
      position: relative;
      z-index: 1;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 0.4in 0.45in 0.3in;
    }

    /* Corner flourishes */
    .flourish {
      position: absolute;
      width: 0.5in;
      height: 0.5in;
      color: var(--coral);
    }

    .flourish-tl { top: 0.15in; left: 0.15in; }
    .flourish-tr { top: 0.15in; right: 0.15in; }

    /* Header */
    .header-title {
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 20pt;
      color: var(--navy);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      text-align: center;
    }

    .header-couple {
      font-family: var(--font-display);
      font-weight: 600;
      font-size: 13pt;
      color: var(--navy);
      text-align: center;
      margin-top: 0.05in;
    }

    .header-couple .ampersand {
      color: var(--coral);
    }

    .header-date {
      font-family: var(--font-utility);
      font-size: 8pt;
      font-weight: 400;
      color: var(--navy-light);
      text-align: center;
      margin-top: 0.02in;
    }

    /* Divider */
    .divider {
      width: 1.5in;
      height: 1px;
      background: var(--coral);
      margin: 0.15in 0;
    }

    /* Timeline */
    .timeline {
      display: flex;
      flex-direction: column;
      gap: 0.12in;
      width: 100%;
      flex: 1;
    }

    .timeline-event {
      display: flex;
      gap: 0.2in;
      align-items: baseline;
    }

    .event-time {
      font-family: var(--font-utility);
      font-size: 8pt;
      font-weight: 500;
      color: var(--coral);
      text-transform: uppercase;
      width: 0.7in;
      text-align: right;
      flex-shrink: 0;
    }

    .event-details {
      flex: 1;
    }

    .event-name {
      font-family: var(--font-display);
      font-weight: 600;
      font-size: 10pt;
      text-transform: uppercase;
      color: var(--navy);
      letter-spacing: 0.03em;
    }

    .event-desc {
      font-family: var(--font-body);
      font-style: italic;
      font-size: 8pt;
      color: var(--navy-light);
      margin-top: 0.01in;
    }

    /* Moose at bottom */
    .moose-small {
      width: 0.8in;
      height: 0.7in;
      color: var(--navy);
      margin-top: auto;
    }

    .moose-small svg {
      width: 100%;
      height: 100%;
    }
  </style>
</head>
<body>
  <div class="card page-program">
    <!-- Corner flourishes -->
    <div class="flourish flourish-tl">
      <svg viewBox="0 0 80 80" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M 5 40 Q 5 15 20 8 Q 35 2 50 8 Q 42 12 38 18" />
        <path d="M 40 5 Q 15 5 8 20 Q 2 35 8 50 Q 12 42 18 38" />
        <path d="M 20 8 Q 25 3 30 8 Q 25 10 20 8" />
        <path d="M 8 20 Q 3 25 8 30 Q 10 25 8 20" />
      </svg>
    </div>
    <div class="flourish flourish-tr">
      <svg viewBox="0 0 80 80" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M 75 40 Q 75 15 60 8 Q 45 2 30 8 Q 38 12 42 18" />
        <path d="M 40 5 Q 65 5 72 20 Q 78 35 72 50 Q 68 42 62 38" />
        <path d="M 60 8 Q 55 3 50 8 Q 55 10 60 8" />
        <path d="M 72 20 Q 77 25 72 30 Q 70 25 72 20" />
      </svg>
    </div>

    <div class="card-inner">
      <!-- Header -->
      <div class="header-title">Order of Events</div>
      <div class="header-couple">Kash <span class="ampersand">&amp;</span> Max</div>
      <div class="header-date">July 3, 2027</div>

      <div class="divider"></div>

      <!-- Timeline -->
      <div class="timeline">
        <div class="timeline-event">
          <div class="event-time">6:00 PM</div>
          <div class="event-details">
            <div class="event-name">Welcome Cocktails</div>
            <div class="event-desc">Sky Yard Rooftop</div>
          </div>
        </div>

        <div class="timeline-event">
          <div class="event-time">6:45 PM</div>
          <div class="event-details">
            <div class="event-name">The Ceremony</div>
          </div>
        </div>

        <div class="timeline-event">
          <div class="event-time">7:15 PM</div>
          <div class="event-details">
            <div class="event-name">Cocktail Hour</div>
            <div class="event-desc">Food stations & drinks</div>
          </div>
        </div>

        <div class="timeline-event">
          <div class="event-time">8:30 PM</div>
          <div class="event-details">
            <div class="event-name">Speeches & Toasts</div>
          </div>
        </div>

        <div class="timeline-event">
          <div class="event-time">9:00 PM</div>
          <div class="event-details">
            <div class="event-name">Dancing</div>
          </div>
        </div>
      </div>

      <!-- Moose -->
      <div class="moose-small">
        <svg viewBox="0 0 120 100" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <!-- Simplified English bulldog sitting -->
          <ellipse cx="60" cy="30" rx="24" ry="18" />
          <!-- Wrinkle -->
          <path d="M 46 20 Q 54 18 62 20" />
          <!-- Rose ears -->
          <path d="M 38 20 Q 32 14 30 20 Q 32 24 36 24" />
          <path d="M 82 20 Q 88 14 90 20 Q 88 24 84 24" />
          <!-- Eyes -->
          <circle cx="48" cy="28" r="2.5" fill="currentColor" />
          <circle cx="72" cy="28" r="2.5" fill="currentColor" />
          <!-- Nose -->
          <ellipse cx="60" cy="36" rx="6" ry="3.5" />
          <!-- Underbite -->
          <path d="M 54 42 Q 60 40 66 42" />
          <!-- Body -->
          <path d="M 38 46 Q 32 54 30 68" />
          <path d="M 82 46 Q 88 54 90 68" />
          <!-- Legs -->
          <path d="M 40 62 L 38 85" />
          <path d="M 48 64 L 46 85" />
          <path d="M 72 64 L 74 85" />
          <path d="M 80 62 L 82 85" />
          <!-- Paws -->
          <path d="M 34 85 Q 38 89 42 87 Q 46 89 50 85" />
          <path d="M 70 85 Q 74 89 78 87 Q 82 89 86 85" />
          <!-- Belly -->
          <path d="M 30 68 Q 60 78 90 68" />
        </svg>
      </div>
    </div>
  </div>
</body>
</html>
