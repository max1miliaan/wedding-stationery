<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wedding Program -- Kash &amp; Max</title>
  <link rel="stylesheet" href="../css/design-system.css">
  <link rel="stylesheet" href="../css/print.css">
  <style>
    @page {
      size: 4.5in 5.75in;
      margin: 0;
    }

    .card {
      width: 4.5in;
      height: 5.75in;
      display: flex;
      flex-direction: column;
      position: relative;
      background: var(--cream);
    }

    .card-inner {
      position: relative;
      z-index: 1;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 0.4in 0.45in 0.3in;
    }

    /* Corner flourishes */
    .flourish {
      position: absolute;
      width: 0.5in;
      height: 0.5in;
      color: var(--coral);
    }

    .flourish-tl { top: 0.15in; left: 0.15in; }
    .flourish-tr { top: 0.15in; right: 0.15in; }

    /* Header */
    .header-title {
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 20pt;
      color: var(--navy);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      text-align: center;
    }

    .header-couple {
      font-family: var(--font-display);
      font-weight: 600;
      font-size: 13pt;
      color: var(--navy);
      text-align: center;
      margin-top: 0.05in;
    }

    .header-couple .ampersand {
      color: var(--coral);
    }

    .header-date {
      font-family: var(--font-utility);
      font-size: 8pt;
      font-weight: 400;
      color: var(--navy-light);
      text-align: center;
      margin-top: 0.02in;
    }

    /* Divider */
    .divider {
      width: 1.5in;
      height: 1px;
      background: var(--coral);
      margin: 0.15in 0;
    }

    /* Timeline */
    .timeline {
      display: flex;
      flex-direction: column;
      gap: 0.12in;
      width: 100%;
      flex: 1;
    }

    .timeline-event {
      display: flex;
      gap: 0.2in;
      align-items: baseline;
    }

    .event-time {
      font-family: var(--font-utility);
      font-size: 8pt;
      font-weight: 500;
      color: var(--coral);
      text-transform: uppercase;
      width: 0.7in;
      text-align: right;
      flex-shrink: 0;
    }

    .event-details {
      flex: 1;
    }

    .event-name {
      font-family: var(--font-display);
      font-weight: 600;
      font-size: 10pt;
      text-transform: uppercase;
      color: var(--navy);
      letter-spacing: 0.03em;
    }

    .event-desc {
      font-family: var(--font-body);
      font-style: italic;
      font-size: 8pt;
      color: var(--navy-light);
      margin-top: 0.01in;
    }

    /* Moose at bottom */
    .moose-small {
      width: 0.8in;
      height: 0.7in;
      color: var(--navy);
      margin-top: auto;
    }

    .moose-small svg {
      width: 100%;
      height: 100%;
    }
  </style>
</head>
<body>
  <div class="card page-program">
    <!-- Corner flourishes -->
    <div class="flourish flourish-tl">
      <svg viewBox="0 0 80 80" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M 5 40 Q 5 15 20 8 Q 35 2 50 8 Q 42 12 38 18" />
        <path d="M 40 5 Q 15 5 8 20 Q 2 35 8 50 Q 12 42 18 38" />
        <path d="M 20 8 Q 25 3 30 8 Q 25 10 20 8" />
        <path d="M 8 20 Q 3 25 8 30 Q 10 25 8 20" />
      </svg>
    </div>
    <div class="flourish flourish-tr">
      <svg viewBox="0 0 80 80" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M 75 40 Q 75 15 60 8 Q 45 2 30 8 Q 38 12 42 18" />
        <path d="M 40 5 Q 65 5 72 20 Q 78 35 72 50 Q 68 42 62 38" />
        <path d="M 60 8 Q 55 3 50 8 Q 55 10 60 8" />
        <path d="M 72 20 Q 77 25 72 30 Q 70 25 72 20" />
      </svg>
    </div>

    <div class="card-inner">
      <!-- Header -->
      <div class="header-title">Order of Events</div>
      <div class="header-couple">Kash <span class="ampersand">&amp;</span> Max</div>
      <div class="header-date">July 3, 2027</div>

      <div class="divider"></div>

      <!-- Timeline -->
      <div class="timeline">
        <div class="timeline-event">
          <div class="event-time">6:00 PM</div>
          <div class="event-details">
            <div class="event-name">Welcome Cocktails</div>
            <div class="event-desc">Sky Yard Rooftop</div>
          </div>
        </div>

        <div class="timeline-event">
          <div class="event-time">6:45 PM</div>
          <div class="event-details">
            <div class="event-name">The Ceremony</div>
          </div>
        </div>

        <div class="timeline-event">
          <div class="event-time">7:15 PM</div>
          <div class="event-details">
            <div class="event-name">Cocktail Hour</div>
            <div class="event-desc">Food stations & drinks</div>
          </div>
        </div>

        <div class="timeline-event">
          <div class="event-time">8:30 PM</div>
          <div class="event-details">
            <div class="event-name">Speeches & Toasts</div>
          </div>
        </div>

        <div class="timeline-event">
          <div class="event-time">9:00 PM</div>
          <div class="event-details">
            <div class="event-name">Dancing</div>
          </div>
        </div>
      </div>

      <!-- Moose -->
      <div class="moose-small">
        <svg viewBox="0 0 110 120" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <!-- Simplified English bulldog sitting -->
          <path d="M 25 38 C 23 24, 33 14, 45 12 C 50 11, 60 11, 65 12 C 77 14, 87 24, 85 38 C 85 46, 80 52, 72 55 C 64 58, 46 58, 38 55 C 30 52, 25 46, 25 38" />
          <!-- Wrinkles -->
          <path d="M 38 22 C 44 19, 50 19, 56 22" />
          <path d="M 60 22 C 66 19, 72 20, 76 23" />
          <!-- Rose ears -->
          <path d="M 28 22 C 24 16, 20 15, 18 20 C 17 23, 20 26, 25 25" />
          <path d="M 82 22 C 86 16, 90 15, 92 20 C 93 23, 90 26, 85 25" />
          <!-- Eyes -->
          <circle cx="40" cy="34" r="3.5" fill="currentColor" />
          <circle cx="70" cy="34" r="3.5" fill="currentColor" />
          <circle cx="39" cy="33" r="1.2" fill="white" stroke="none" />
          <circle cx="69" cy="33" r="1.2" fill="white" stroke="none" />
          <!-- Nose -->
          <path d="M 48 42 C 48 40, 51 38, 55 38 C 59 38, 62 40, 62 42 C 62 45, 59 46, 55 46 C 51 46, 48 45, 48 42" />
          <ellipse cx="52" cy="42" rx="2" ry="1.5" />
          <ellipse cx="58" cy="42" rx="2" ry="1.5" />
          <!-- Underbite -->
          <path d="M 44 50 C 48 48, 52 47, 55 48 C 58 47, 62 48, 66 50" />
          <path d="M 50 50 L 50 48" />
          <path d="M 60 50 L 60 48" />
          <!-- Jowls -->
          <path d="M 32 44 C 30 48, 30 52, 34 55" />
          <path d="M 78 44 C 80 48, 80 52, 76 55" />
          <!-- Body -->
          <path d="M 32 58 C 27 66, 24 78, 22 88 C 21 94, 24 98, 28 102" />
          <path d="M 78 58 C 83 66, 86 78, 88 88 C 89 94, 86 98, 82 102" />
          <!-- Front legs -->
          <path d="M 34 82 C 33 88, 32 96, 31 106" />
          <path d="M 42 84 C 41 90, 40 98, 39 106" />
          <path d="M 68 84 C 69 90, 70 98, 71 106" />
          <path d="M 76 82 C 77 88, 78 96, 79 106" />
          <!-- Paws -->
          <path d="M 27 106 C 29 110, 33 111, 36 110 C 39 111, 43 110, 44 106" />
          <path d="M 66 106 C 68 110, 72 111, 75 110 C 78 111, 82 110, 83 106" />
          <!-- Belly -->
          <path d="M 28 102 C 42 108, 68 108, 82 102" />
        </svg>
      </div>
    </div>
  </div>
</body>
</html>
