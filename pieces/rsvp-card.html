<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RSVP Card -- Kash &amp; Max</title>
  <link rel="stylesheet" href="../css/design-system.css">
  <link rel="stylesheet" href="../css/print.css">
  <style>
    @page {
      size: 3.75in 5.25in;
      margin: 0;
    }

    .card {
      width: 3.75in;
      height: 5.25in;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      position: relative;
      background: var(--cream);
    }

    .card-inner {
      position: relative;
      z-index: 1;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.18in;
      padding: 0.375in;
    }

    /* RSVP title */
    .rsvp-title {
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 28pt;
      color: var(--coral);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    /* Respond by */
    .respond-by {
      font-family: var(--font-utility);
      font-size: 9pt;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      color: var(--navy);
    }

    /* QR code placeholder */
    .qr-placeholder {
      width: 1.3in;
      height: 1.3in;
      border: 1.5px solid var(--navy-light);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0.05in 0;
    }

    .qr-label {
      font-family: var(--font-utility);
      font-size: 7pt;
      color: var(--navy-light);
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    /* Scan label */
    .scan-label {
      font-family: var(--font-utility);
      font-size: 8pt;
      font-weight: 400;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      color: var(--navy-light);
      margin-top: -0.08in;
    }

    /* Moose with party hat */
    .moose-party {
      width: 1.1in;
      height: 1.1in;
      color: var(--navy);
      margin-top: 0.05in;
    }

    .moose-party svg {
      width: 100%;
      height: 100%;
    }

    /* Corner flourishes (top corners only) */
    .flourish {
      position: absolute;
      width: 0.5in;
      height: 0.5in;
      color: var(--coral);
    }

    .flourish-tl { top: 0.15in; left: 0.15in; }
    .flourish-tr { top: 0.15in; right: 0.15in; }
  </style>
</head>
<body>
  <div class="card page-rsvp">
    <!-- Corner flourishes -->
    <div class="flourish flourish-tl">
      <svg viewBox="0 0 80 80" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M 5 40 Q 5 15 20 8 Q 35 2 50 8 Q 42 12 38 18" />
        <path d="M 40 5 Q 15 5 8 20 Q 2 35 8 50 Q 12 42 18 38" />
        <path d="M 20 8 Q 25 3 30 8 Q 25 10 20 8" />
        <path d="M 8 20 Q 3 25 8 30 Q 10 25 8 20" />
      </svg>
    </div>
    <div class="flourish flourish-tr">
      <svg viewBox="0 0 80 80" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M 75 40 Q 75 15 60 8 Q 45 2 30 8 Q 38 12 42 18" />
        <path d="M 40 5 Q 65 5 72 20 Q 78 35 72 50 Q 68 42 62 38" />
        <path d="M 60 8 Q 55 3 50 8 Q 55 10 60 8" />
        <path d="M 72 20 Q 77 25 72 30 Q 70 25 72 20" />
      </svg>
    </div>

    <div class="card-inner">
      <!-- RSVP title -->
      <div class="rsvp-title">RSVP</div>

      <!-- Respond by date -->
      <div class="respond-by">Kindly respond by May 15, 2027</div>

      <!-- QR code placeholder -->
      <div class="qr-placeholder">
        <div class="qr-label">QR Code</div>
      </div>

      <!-- Scan label -->
      <div class="scan-label">Scan to reply</div>

      <!-- Moose with party hat -->
      <div class="moose-party">
        <svg viewBox="0 0 130 155" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <!-- Party hat -->
          <path d="M 62 4 L 44 42 L 82 42 Z" />
          <circle cx="62" cy="4" r="4" />
          <path d="M 55 22 L 69 22" />
          <path d="M 52 30 L 72 30" />
          <path d="M 49 36 L 75 36" />
          <!-- Hat elastic -->
          <path d="M 44 42 C 42 44, 38 45, 34 44" />
          <path d="M 82 42 C 84 44, 90 46, 95 46" />
          <!-- Head (slightly tilted) -->
          <path d="M 28 50 C 26 34, 38 22, 52 20 C 58 19, 72 19, 78 22 C 92 26, 102 38, 100 52 C 100 60, 94 66, 86 70 C 76 74, 56 74, 46 70 C 36 66, 28 58, 28 50" />
          <!-- Wrinkles -->
          <path d="M 42 32 C 48 29, 56 29, 60 32" />
          <path d="M 68 30 C 74 28, 82 28, 86 32" />
          <path d="M 48 36 C 56 34, 72 34, 80 36" />
          <!-- Rose ears -->
          <path d="M 32 34 C 28 26, 22 24, 20 30 C 19 34, 22 38, 28 38" />
          <path d="M 96 36 C 100 28, 106 26, 108 32 C 109 36, 106 40, 100 40" />
          <!-- Eyes -->
          <circle cx="48" cy="48" r="4" fill="currentColor" />
          <circle cx="80" cy="48" r="4" fill="currentColor" />
          <circle cx="46" cy="46" r="1.5" fill="white" stroke="none" />
          <circle cx="78" cy="46" r="1.5" fill="white" stroke="none" />
          <!-- Nose -->
          <path d="M 54 56 C 54 52, 58 50, 64 50 C 70 50, 74 52, 74 56 C 74 60, 70 62, 64 62 C 58 62, 54 60, 54 56" />
          <ellipse cx="60" cy="56" rx="2.5" ry="2" />
          <ellipse cx="68" cy="56" rx="2.5" ry="2" />
          <!-- Underbite + tongue -->
          <path d="M 50 66 C 55 63, 60 62, 64 64 C 68 62, 74 63, 78 66" />
          <path d="M 58 66 L 58 63" />
          <path d="M 70 66 L 70 63" />
          <path d="M 62 66 C 62 70, 64 73, 66 72 C 68 71, 68 68, 66 66" />
          <!-- Jowls -->
          <path d="M 38 58 C 34 62, 34 68, 40 72" />
          <path d="M 90 58 C 94 62, 94 68, 88 72" />
          <!-- Neck rolls -->
          <path d="M 36 72 C 44 76, 56 78, 64 78" />
          <path d="M 92 72 C 84 76, 72 78, 64 78" />
          <!-- Body -->
          <path d="M 38 82 C 32 90, 28 102, 26 114 C 25 120, 28 126, 32 130" />
          <path d="M 90 82 C 96 90, 100 102, 102 114 C 103 120, 100 126, 96 130" />
          <!-- Front legs -->
          <path d="M 40 106 C 39 114, 38 124, 37 136" />
          <path d="M 50 108 C 49 116, 48 126, 47 136" />
          <path d="M 78 108 C 79 116, 80 126, 81 136" />
          <path d="M 88 106 C 89 114, 90 124, 91 136" />
          <!-- Paws -->
          <path d="M 32 136 C 34 141, 38 142, 42 141 C 46 142, 50 141, 52 136" />
          <path d="M 76 136 C 78 141, 82 142, 86 141 C 90 142, 94 141, 96 136" />
          <path d="M 38 140 L 38 137" />
          <path d="M 42 141 L 42 138" />
          <path d="M 46 140 L 46 137" />
          <path d="M 82 140 L 82 137" />
          <path d="M 86 141 L 86 138" />
          <path d="M 90 140 L 90 137" />
          <!-- Belly -->
          <path d="M 32 130 C 48 138, 80 138, 96 130" />
        </svg>
      </div>
    </div>
  </div>
</body>
</html>
