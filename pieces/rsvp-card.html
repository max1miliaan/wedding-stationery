<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RSVP Card -- Kash &amp; Max</title>
  <link rel="stylesheet" href="../css/design-system.css">
  <link rel="stylesheet" href="../css/print.css">
  <style>
    @page {
      size: 3.75in 5.25in;
      margin: 0;
    }

    .card {
      width: 3.75in;
      height: 5.25in;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      position: relative;
      background: var(--cream);
    }

    .card-inner {
      position: relative;
      z-index: 1;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.18in;
      padding: 0.375in;
    }

    /* RSVP title */
    .rsvp-title {
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 28pt;
      color: var(--coral);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    /* Respond by */
    .respond-by {
      font-family: var(--font-utility);
      font-size: 9pt;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      color: var(--navy);
    }

    /* QR code placeholder */
    .qr-placeholder {
      width: 1.3in;
      height: 1.3in;
      border: 1.5px solid var(--navy-light);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0.05in 0;
    }

    .qr-label {
      font-family: var(--font-utility);
      font-size: 7pt;
      color: var(--navy-light);
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    /* Scan label */
    .scan-label {
      font-family: var(--font-utility);
      font-size: 8pt;
      font-weight: 400;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      color: var(--navy-light);
      margin-top: -0.08in;
    }

    /* Moose with party hat */
    .moose-party {
      width: 1.1in;
      height: 1.1in;
      color: var(--navy);
      margin-top: 0.05in;
    }

    .moose-party svg {
      width: 100%;
      height: 100%;
    }

    /* Corner flourishes (top corners only) */
    .flourish {
      position: absolute;
      width: 0.5in;
      height: 0.5in;
      color: var(--coral);
    }

    .flourish-tl { top: 0.15in; left: 0.15in; }
    .flourish-tr { top: 0.15in; right: 0.15in; }
  </style>
</head>
<body>
  <div class="card page-rsvp">
    <!-- Corner flourishes -->
    <div class="flourish flourish-tl">
      <svg viewBox="0 0 80 80" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M 5 40 Q 5 15 20 8 Q 35 2 50 8 Q 42 12 38 18" />
        <path d="M 40 5 Q 15 5 8 20 Q 2 35 8 50 Q 12 42 18 38" />
        <path d="M 20 8 Q 25 3 30 8 Q 25 10 20 8" />
        <path d="M 8 20 Q 3 25 8 30 Q 10 25 8 20" />
      </svg>
    </div>
    <div class="flourish flourish-tr">
      <svg viewBox="0 0 80 80" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M 75 40 Q 75 15 60 8 Q 45 2 30 8 Q 38 12 42 18" />
        <path d="M 40 5 Q 65 5 72 20 Q 78 35 72 50 Q 68 42 62 38" />
        <path d="M 60 8 Q 55 3 50 8 Q 55 10 60 8" />
        <path d="M 72 20 Q 77 25 72 30 Q 70 25 72 20" />
      </svg>
    </div>

    <div class="card-inner">
      <!-- RSVP title -->
      <div class="rsvp-title">RSVP</div>

      <!-- Respond by date -->
      <div class="respond-by">Kindly respond by May 15, 2027</div>

      <!-- QR code placeholder -->
      <div class="qr-placeholder">
        <div class="qr-label">QR Code</div>
      </div>

      <!-- Scan label -->
      <div class="scan-label">Scan to reply</div>

      <!-- Moose with party hat -->
      <div class="moose-party">
        <svg viewBox="0 0 120 120" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <!-- English bulldog with party hat -->
          <!-- Party hat -->
          <path d="M 60 2 L 42 38 L 78 38 Z" />
          <circle cx="60" cy="2" r="3" />
          <!-- Hat stripes -->
          <path d="M 53 20 L 67 20" />
          <path d="M 50 28 L 70 28" />

          <!-- Head (wide, flat, wrinkly) -->
          <ellipse cx="60" cy="52" rx="28" ry="20" />
          <!-- Wrinkle lines -->
          <path d="M 44 42 Q 52 40 60 42" />
          <path d="M 60 42 Q 68 40 76 42" />
          <!-- Rose ears -->
          <path d="M 34 42 Q 28 35 26 42 Q 28 47 32 46" />
          <path d="M 86 42 Q 92 35 94 42 Q 92 47 88 46" />
          <!-- Eyes -->
          <circle cx="48" cy="50" r="3" fill="currentColor" />
          <circle cx="72" cy="50" r="3" fill="currentColor" />
          <!-- Wide flat nose -->
          <ellipse cx="60" cy="60" rx="7" ry="4" />
          <circle cx="56" cy="60" r="1.5" />
          <circle cx="64" cy="60" r="1.5" />
          <!-- Underbite with tongue -->
          <path d="M 52 66 Q 56 64 60 66 Q 64 64 68 66" />
          <path d="M 57 66 Q 60 72 63 66" />
          <!-- Jowls -->
          <path d="M 40 58 Q 37 64 40 68" />
          <path d="M 80 58 Q 83 64 80 68" />

          <!-- Stocky body -->
          <path d="M 38 70 Q 32 78 30 90 Q 28 98 32 105" />
          <path d="M 82 70 Q 88 78 90 90 Q 92 98 88 105" />
          <!-- Front legs -->
          <path d="M 42 88 L 40 112" />
          <path d="M 50 90 L 48 112" />
          <path d="M 70 90 L 72 112" />
          <path d="M 78 88 L 80 112" />
          <!-- Paws -->
          <path d="M 36 112 Q 40 116 44 114 Q 48 116 52 112" />
          <path d="M 68 112 Q 72 116 76 114 Q 80 116 84 112" />
          <!-- Round belly -->
          <path d="M 32 105 Q 60 114 88 105" />
        </svg>
      </div>
    </div>
  </div>
</body>
</html>
