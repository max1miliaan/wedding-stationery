<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Save the Date -- Kash &amp; Max</title>
  <link rel="stylesheet" href="../css/design-system.css">
  <link rel="stylesheet" href="../css/print.css">
  <style>
    @page {
      size: 5.25in 7.25in;
      margin: 0;
    }

    .card {
      width: 5.25in;
      height: 7.25in;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      position: relative;
      background: var(--cream);
    }

    .card-inner {
      padding: 0.375in;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.2in;
      position: relative;
    }

    /* Corner flourishes */
    .flourish {
      position: absolute;
      width: 0.7in;
      height: 0.7in;
      color: var(--coral);
    }

    .flourish-tl { top: 0.2in; left: 0.2in; }
    .flourish-tr { top: 0.2in; right: 0.2in; }
    .flourish-bl { bottom: 0.2in; left: 0.2in; }
    .flourish-br { bottom: 0.2in; right: 0.2in; }

    /* Save the Date label */
    .save-label {
      font-family: var(--font-utility);
      font-size: 11pt;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.25em;
      color: var(--navy-light);
      margin-bottom: 0.05in;
    }

    /* Couple names */
    .couple-names {
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 62pt;
      line-height: 0.95;
      color: var(--navy);
      letter-spacing: -0.02em;
    }

    .couple-names .ampersand {
      color: var(--coral);
      font-size: 50pt;
    }

    .name-first {
      display: block;
      margin-bottom: -0.08in;
    }

    .name-second {
      display: block;
      margin-top: -0.08in;
    }

    /* Illustration */
    .illustration-champagne {
      width: 1.2in;
      height: 1.3in;
      color: var(--navy);
      margin: 0.1in 0;
    }

    /* Date */
    .date {
      font-family: var(--font-body);
      font-weight: 600;
      font-size: 18pt;
      color: var(--navy);
      letter-spacing: 0.05em;
    }

    /* Venue */
    .venue {
      font-family: var(--font-utility);
      font-size: 10pt;
      font-weight: 400;
      text-transform: uppercase;
      letter-spacing: 0.2em;
      color: var(--navy-light);
      margin-top: -0.05in;
    }

    .venue-divider {
      display: inline-block;
      margin: 0 0.08in;
      color: var(--coral);
    }

    /* Moose illustration */
    .moose-placeholder {
      width: 1.3in;
      height: 1.5in;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-top: 0.1in;
      color: var(--navy);
    }

    .moose-placeholder svg {
      width: 100%;
      height: 100%;
    }

    /* Invitation to follow */
    .follow-text {
      font-family: var(--font-body);
      font-style: italic;
      font-size: 10pt;
      color: var(--navy-light);
      margin-top: 0.05in;
    }

    /* Subtle gradient wash at edges */
    .card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: radial-gradient(
        ellipse at 50% 100%,
        rgba(232, 112, 74, 0.04) 0%,
        transparent 60%
      );
      pointer-events: none;
      z-index: 0;
    }

    .card-inner {
      position: relative;
      z-index: 1;
    }
  </style>
</head>
<body>
  <div class="card page-save-the-date">
    <!-- Corner flourishes -->
    <div class="flourish flourish-tl">
      <svg viewBox="0 0 80 80" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M 5 40 Q 5 15 20 8 Q 35 2 50 8 Q 42 12 38 18" />
        <path d="M 40 5 Q 15 5 8 20 Q 2 35 8 50 Q 12 42 18 38" />
        <path d="M 20 8 Q 25 3 30 8 Q 25 10 20 8" />
        <path d="M 8 20 Q 3 25 8 30 Q 10 25 8 20" />
        <circle cx="35" cy="5" r="1.5" />
        <circle cx="5" cy="35" r="1.5" />
      </svg>
    </div>
    <div class="flourish flourish-tr">
      <svg viewBox="0 0 80 80" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M 75 40 Q 75 15 60 8 Q 45 2 30 8 Q 38 12 42 18" />
        <path d="M 40 5 Q 65 5 72 20 Q 78 35 72 50 Q 68 42 62 38" />
        <path d="M 60 8 Q 55 3 50 8 Q 55 10 60 8" />
        <path d="M 72 20 Q 77 25 72 30 Q 70 25 72 20" />
        <circle cx="45" cy="5" r="1.5" />
        <circle cx="75" cy="35" r="1.5" />
      </svg>
    </div>
    <div class="flourish flourish-bl">
      <svg viewBox="0 0 80 80" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M 5 40 Q 5 65 20 72 Q 35 78 50 72 Q 42 68 38 62" />
        <path d="M 40 75 Q 15 75 8 60 Q 2 45 8 30 Q 12 38 18 42" />
        <path d="M 20 72 Q 25 77 30 72 Q 25 70 20 72" />
        <path d="M 8 60 Q 3 55 8 50 Q 10 55 8 60" />
        <circle cx="35" cy="75" r="1.5" />
        <circle cx="5" cy="45" r="1.5" />
      </svg>
    </div>
    <div class="flourish flourish-br">
      <svg viewBox="0 0 80 80" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M 75 40 Q 75 65 60 72 Q 45 78 30 72 Q 38 68 42 62" />
        <path d="M 40 75 Q 65 75 72 60 Q 78 45 72 30 Q 68 38 62 42" />
        <path d="M 60 72 Q 55 77 50 72 Q 55 70 60 72" />
        <path d="M 72 60 Q 77 55 72 50 Q 70 55 72 60" />
        <circle cx="45" cy="75" r="1.5" />
        <circle cx="75" cy="45" r="1.5" />
      </svg>
    </div>

    <div class="card-inner">
      <!-- Save the Date label -->
      <div class="save-label">Save the Date</div>

      <!-- Couple names -->
      <div class="couple-names">
        <span class="name-first">Kash</span>
        <span class="ampersand">&amp;</span>
        <span class="name-second">Max</span>
      </div>

      <!-- Champagne glasses illustration -->
      <div class="illustration-champagne">
        <svg viewBox="0 0 120 140" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M 25 90 Q 25 60 35 45 Q 38 40 40 35 L 42 20 Q 43 12 50 10 Q 55 9 58 12" />
          <path d="M 25 90 L 15 95" /><path d="M 10 95 L 22 95" />
          <ellipse cx="42" cy="45" rx="16" ry="8" />
          <path d="M 26 45 Q 28 32 42 28 Q 56 32 58 45" />
          <path d="M 95 90 Q 95 60 85 45 Q 82 40 80 35 L 78 20 Q 77 12 70 10 Q 65 9 62 12" />
          <path d="M 95 90 L 105 95" /><path d="M 98 95 L 110 95" />
          <ellipse cx="78" cy="45" rx="16" ry="8" />
          <path d="M 62 45 Q 64 32 78 28 Q 92 32 94 45" />
          <line x1="55" y1="25" x2="52" y2="18" />
          <line x1="60" y1="22" x2="60" y2="14" />
          <line x1="65" y1="25" x2="68" y2="18" />
          <line x1="50" y1="30" x2="45" y2="26" />
          <line x1="70" y1="30" x2="75" y2="26" />
          <circle cx="48" cy="15" r="1.5" />
          <circle cx="72" cy="13" r="1" />
          <circle cx="58" cy="8" r="1.5" />
        </svg>
      </div>

      <!-- Date -->
      <div class="date">July 3, 2027</div>

      <!-- Venue -->
      <div class="venue">
        The Drake Hotel
        <span class="venue-divider">/</span>
        Toronto
      </div>

      <!-- Moose (English bulldog sitting with bowtie) -->
      <div class="moose-placeholder">
        <svg viewBox="0 0 130 150" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <!-- Head: wide, slightly flat, massive relative to body -->
          <path d="M 30 45 C 28 28, 40 14, 55 12 C 60 11, 70 11, 75 12 C 90 14, 102 28, 100 45 C 100 55, 94 62, 85 66 C 75 70, 55 70, 45 66 C 36 62, 30 55, 30 45" />
          <!-- Forehead wrinkles -->
          <path d="M 44 24 C 50 21, 58 21, 62 24" />
          <path d="M 68 24 C 74 21, 80 21, 86 24" />
          <path d="M 50 30 C 58 27, 72 27, 80 30" />
          <path d="M 62 30 C 64 33, 66 33, 68 30" />
          <!-- Rose ears -->
          <path d="M 34 26 C 30 18, 24 16, 22 22 C 21 26, 24 30, 30 30" />
          <path d="M 96 26 C 100 18, 106 16, 108 22 C 109 26, 106 30, 100 30" />
          <!-- Eyes -->
          <circle cx="48" cy="40" r="4.5" fill="currentColor" />
          <circle cx="82" cy="40" r="4.5" fill="currentColor" />
          <circle cx="46" cy="38" r="1.5" fill="white" stroke="none" />
          <circle cx="80" cy="38" r="1.5" fill="white" stroke="none" />
          <!-- Wide flat nose -->
          <path d="M 54 50 C 54 46, 58 44, 65 44 C 72 44, 76 46, 76 50 C 76 54, 72 56, 65 56 C 58 56, 54 54, 54 50" />
          <ellipse cx="60" cy="50" rx="3" ry="2.5" />
          <ellipse cx="70" cy="50" rx="3" ry="2.5" />
          <!-- Underbite jaw -->
          <path d="M 50 60 C 54 57, 60 56, 65 58 C 70 56, 76 57, 80 60" />
          <path d="M 58 60 L 58 57" />
          <path d="M 65 60 L 65 56.5" />
          <path d="M 72 60 L 72 57" />
          <!-- Jowls -->
          <path d="M 40 52 C 36 56, 36 62, 42 65" />
          <path d="M 90 52 C 94 56, 94 62, 88 65" />
          <!-- Neck rolls -->
          <path d="M 38 66 C 45 70, 55 72, 65 72" />
          <path d="M 92 66 C 85 70, 75 72, 65 72" />
          <!-- Bowtie -->
          <path d="M 48 76 L 58 72 L 58 80 Z" />
          <path d="M 82 76 L 72 72 L 72 80 Z" />
          <circle cx="65" cy="76" r="3.5" />
          <!-- Stocky body -->
          <path d="M 40 78 C 34 85, 30 95, 28 108 C 27 115, 30 122, 34 126" />
          <path d="M 90 78 C 96 85, 100 95, 102 108 C 103 115, 100 122, 96 126" />
          <!-- Front legs -->
          <path d="M 42 100 C 41 108, 40 118, 39 130" />
          <path d="M 52 102 C 51 110, 50 120, 49 130" />
          <path d="M 78 102 C 79 110, 80 120, 81 130" />
          <path d="M 88 100 C 89 108, 90 118, 91 130" />
          <!-- Big splayed paws -->
          <path d="M 34 130 C 36 135, 40 136, 44 135 C 48 136, 52 135, 54 130" />
          <path d="M 76 130 C 78 135, 82 136, 86 135 C 90 136, 94 135, 96 130" />
          <path d="M 40 134 L 40 131" />
          <path d="M 44 135 L 44 132" />
          <path d="M 48 134 L 48 131" />
          <path d="M 82 134 L 82 131" />
          <path d="M 86 135 L 86 132" />
          <path d="M 90 134 L 90 131" />
          <!-- Round belly -->
          <path d="M 34 126 C 50 134, 80 134, 96 126" />
        </svg>
      </div>

      <!-- Invitation to follow -->
      <div class="follow-text">Invitation to follow</div>
    </div>
  </div>
</body>
</html>
