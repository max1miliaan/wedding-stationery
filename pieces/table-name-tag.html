<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Table Name Tag -- Kash &amp; Max</title>
  <link rel="stylesheet" href="../css/design-system.css">
  <link rel="stylesheet" href="../css/print.css">
  <style>
    @page {
      size: 3.75in 2.25in;
      margin: 0;
    }

    .card {
      width: 3.75in;
      height: 2.25in;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      position: relative;
      background: var(--cream);
    }

    .card-inner {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.08in;
    }

    /* Guest name */
    .guest-name {
      font-family: var(--font-display);
      font-weight: 600;
      font-size: 16pt;
      color: var(--navy);
    }

    /* Accent rule */
    .accent-rule {
      width: 1.5in;
      height: 1px;
      background: var(--coral);
    }

    /* Corner flourish */
    .flourish-br {
      position: absolute;
      bottom: 0.12in;
      right: 0.12in;
      width: 0.35in;
      height: 0.35in;
      color: var(--coral);
      opacity: 0.6;
    }

    .flourish-br svg {
      width: 100%;
      height: 100%;
    }
  </style>
</head>
<body>
  <div class="card page-name-tag">
    <div class="card-inner">
      <div class="guest-name">Guest Name</div>
      <div class="accent-rule"></div>
    </div>

    <!-- Small corner flourish -->
    <div class="flourish-br">
      <svg viewBox="0 0 80 80" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M 75 40 Q 75 65 60 72 Q 45 78 30 72 Q 38 68 42 62" />
        <path d="M 40 75 Q 65 75 72 60 Q 78 45 72 30 Q 68 38 62 42" />
        <path d="M 60 72 Q 55 77 50 72 Q 55 70 60 72" />
        <path d="M 72 60 Q 77 55 72 50 Q 70 55 72 60" />
      </svg>
    </div>
  </div>
</body>
</html>
